# PowerSync Service Configuration
# Deploy on VPS with: DB_PASSWORD="xxx" docker compose -f powersync.yaml up -d

services:
  powersync:
    image: journeyapps/powersync-service:latest
    network_mode: "host"
    volumes:
      - ./powersync-config-resolved.yaml:/app/powersync.yaml:ro
      - ./sync-rules.yaml:/app/sync-rules.yaml:ro
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
