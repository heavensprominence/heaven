<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reset Password — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71;--danger:#E74C3C}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:var(--card);padding:40px;border-radius:16px;border:1px solid rgba(200,169,81,.15);max-width:420px;width:90%;text-align:center}
h1{color:var(--gold);font-size:1.3rem;margin-bottom:8px}h2{color:var(--gold);font-size:1rem;margin-bottom:16px}
p{color:var(--muted);font-size:.85rem;margin:12px 0;line-height:1.5}
input{width:100%;padding:10px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-size:.9rem;margin:8px 0}
.btn{display:inline-block;padding:12px 28px;background:var(--gold);color:var(--darker);border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem;margin-top:12px;text-decoration:none}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5}
.msg{padding:8px 12px;border-radius:6px;font-size:.82rem;margin:8px 0}.ok{background:rgba(46,204,113,.1);color:var(--success)}.err{background:rgba(231,76,60,.1);color:var(--danger)}
.back{color:var(--muted);font-size:.8rem;margin-top:16px;display:block}
</style></head><body>
<div class="card">
  <h1>🔐 Reset Your Password</h1>
  <div id="step1">
    <p>Enter your email and we'll send you a reset link.</p>
    <input id="email" type="email" placeholder="you@email.com">
    <div id="msg1" class="msg" style="display:none"></div>
    <button class="btn" onclick="requestReset()">Send Reset Link</button>
  </div>
  <div id="step2" style="display:none">
    <h2>Set New Password</h2>
    <input id="pw" type="password" placeholder="New password (min 8 chars)" minlength="8">
    <input id="pw2" type="password" placeholder="Confirm password">
    <div id="msg2" class="msg" style="display:none"></div>
    <button class="btn" onclick="doReset()">Update Password</button>
  </div>
  <a href="/shop/" class="back">← Back to Shop</a>
</div>
<script>
var token=new URLSearchParams(location.search).get("token");
if(token){
  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
  // Verify token
  fetch("/api/auth/reset-password/verify?token="+token).then(function(r){return r.json()}).then(function(d){
    if(!d.valid){document.getElementById("msg2").textContent="This reset link has expired.";document.getElementById("msg2").className="msg err";document.getElementById("msg2").style.display="block"}
  });
}
async function requestReset(){
  var e=document.getElementById("email").value.trim(),b=document.querySelector("#step1 .btn"),m=document.getElementById("msg1");
  if(!e){m.textContent="Please enter your email.";m.className="msg err";m.style.display="block";return}
  b.disabled=true;b.textContent="Sending...";
  try{
    var r=await fetch("/api/auth/forgot-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:e})});
    var d=await r.json();
    m.textContent=d.message||"Check your email for the reset link.";
    m.className="msg ok";m.style.display="block";
  }catch(x){m.textContent="Server error. Try again.";m.className="msg err";m.style.display="block"}
  b.disabled=false;b.textContent="Send Reset Link";
}
async function doReset(){
  var p=document.getElementById("pw").value,p2=document.getElementById("pw2").value,b=document.querySelector("#step2 .btn"),m=document.getElementById("msg2");
  if(p.length<8){m.textContent="Password must be at least 8 characters.";m.className="msg err";m.style.display="block";return}
  if(p!==p2){m.textContent="Passwords don't match.";m.className="msg err";m.style.display="block";return}
  b.disabled=true;b.textContent="Updating...";
  try{
    var r=await fetch("/api/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:token,password:p})});
    var d=await r.json();
    m.textContent=d.error||"Password updated! Redirecting to sign in...";
    m.className=d.success?"msg ok":"msg err";m.style.display="block";
    if(d.success)setTimeout(function(){location.href="/credon/"},2000);
  }catch(x){m.textContent="Server error.";m.className="msg err";m.style.display="block"}
  b.disabled=false;b.textContent="Update Password";
}
</script>
</body></html>
