<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HeavensLive Monitor</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--green:#2ECC71;--red:#E74C3C;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text);padding:20px}
h1{color:var(--gold);margin-bottom:4px}.sub{color:var(--muted);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05)}
.card h3{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .value{font-size:2rem;font-weight:800;color:var(--gold)}.card .detail{font-size:.75rem;color:var(--muted);margin-top:4px}
.ok{color:var(--green)}.bad{color:var(--red)}
.error-list{max-height:400px;overflow-y:auto;margin-top:10px}.error-item{background:rgba(231,76,60,.08);border-left:3px solid var(--red);padding:8px 12px;margin-bottom:6px;border-radius:0 6px 6px 0;font-size:.8rem}.error-item .etime{color:var(--muted);font-size:.7rem}
.refresh{text-align:center;color:var(--muted);font-size:.7rem;margin-top:16px}
</style></head><body>
<h1>📊 HeavensLive Monitor</h1><div class="sub" id="subtitle">Loading...</div>

<div class="grid">
  <div class="card"><h3>System Status</h3><div class="value" id="sysStatus">--</div><div class="detail" id="sysUptime"></div></div>
  <div class="card"><h3>Users</h3><div class="value" id="dbUsers">--</div><div class="detail">Registered accounts</div></div>
  <div class="card"><h3>Active Listings</h3><div class="value" id="dbListings">--</div><div class="detail">On marketplace</div></div>
  <div class="card"><h3>Memory</h3><div class="value" id="sysMem">--</div><div class="detail" id="sysMemDetail"></div></div>
</div>

<div class="card"><h3>Recent Errors</h3><div class="error-list" id="errors">—</div></div>
<div class="refresh">Auto-refreshes every 30s · Last: <span id="lastRefresh">--</span></div>

<script>
async function refresh() {
  try {
    var r = await fetch('/api/admin/metrics');
    var d = await r.json();
    var s = d.system || {};
    
    document.getElementById('sysStatus').innerHTML = '<span class="ok">● Online</span>';
    document.getElementById('sysUptime').textContent = 'Uptime: ' + Math.floor(s.uptime/60) + 'm · PID ' + s.pid;
    document.getElementById('dbUsers').textContent = (d.db?.users || '--').toLocaleString();
    document.getElementById('dbListings').textContent = (d.db?.activeListings || '--').toLocaleString();
    var mb = Math.round((s.memory?.rss || 0) / 1024 / 1024);
    document.getElementById('sysMem').textContent = mb + ' MB';
    document.getElementById('sysMemDetail').textContent = 'Node ' + s.nodeVersion;
    
    var errors = s.recentErrors || [];
    var errHtml = errors.length ? errors.map(function(e) {
      return '<div class="error-item"><div class="etime">' + new Date(e.time).toLocaleTimeString() + '</div>' + e.msg + '</div>';
    }).join('') : '<div style="color:var(--green);padding:10px">✅ No recent errors</div>';
    document.getElementById('errors').innerHTML = errHtml;
    
    document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
    document.getElementById('subtitle').textContent = 'Server: ' + (s.pid || '?') + ' · Node ' + s.nodeVersion;
  } catch(e) {
    document.getElementById('sysStatus').innerHTML = '<span class="bad">● Offline</span>';
    document.getElementById('subtitle').textContent = 'Connection failed: ' + e.message;
  }
}
refresh();
setInterval(refresh, 30000);
</script>
</body></html>
