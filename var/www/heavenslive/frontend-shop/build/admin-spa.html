<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin — HeavensLive</title><link rel="icon" href="/shop/favicon.ico"/></head><body style="background:#0a0f1f;color:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh"><div id="guard" style="text-align:center;color:#c8a951;font-size:1.2rem">Verifying access...</div><div id="root" style="display:none"></div>
<script>
(async function(){
  var token = localStorage.getItem("token");
  if (!token) { window.location.replace("/shop/login"); return; }
  try {
    var r = await fetch("/api/auth/me", { headers: { "Authorization": "Bearer " + token } });
    if (!r.ok) { window.location.replace("/shop/login"); return; }
    var u = await r.json();
    if (!u.is_super_admin) { window.location.replace("/shop/"); return; }
    // Admin confirmed — show app
    document.getElementById("guard").remove();
    document.getElementById("root").style.display = "";
  } catch(e) { window.location.replace("/shop/"); }
})();
</script>
<script defer="defer" src="/shop/static/js/main.9d20e8a5.js"></script>
<link href="/shop/static/css/main.1a1d9a8f.css" rel="stylesheet">
</body></html>
