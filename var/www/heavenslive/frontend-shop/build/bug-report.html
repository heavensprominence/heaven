<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta property="og:title" content="Bug Report — HeavensLive">
<meta property="og:description" content="Shop, sell, and auction across 84 currencies. Grants, 0% interest loans, and a public treasury ledger.">
<meta property="og:image" content="https://heavenslive.com/hl-icon-512.png">
<meta property="og:url" content="https://heavenslive.com/shop/bug-report">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Bug Report — HeavensLive">
<meta name="twitter:description" content="Shop, sell, and auction across 84 currencies. Grants, 0% interest loans, and a public treasury ledger.">
<meta name="twitter:image" content="https://heavenslive.com/hl-icon-512.png"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bug Report — HeavensLive</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:var(--card);padding:32px;border-radius:14px;border:1px solid rgba(200,169,81,.15);max-width:460px;width:90%}
h1{color:var(--gold);font-size:1.2rem;margin-bottom:16px}p{color:var(--muted);font-size:.85rem;margin-bottom:16px}
input,select,textarea{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-size:.9rem;margin-bottom:10px}
textarea{min-height:100px;resize:vertical}
.btn{width:100%;padding:12px;background:var(--gold);color:var(--darker);border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5}
.msg{padding:8px;border-radius:6px;font-size:.8rem;margin:8px 0;text-align:center;display:none}.ok{background:rgba(46,204,113,.1);color:var(--success)}.err{background:rgba(231,76,60,.1);color:#E74C3C}
</style></head><body>
<div class="card">
<h1>🐛 Report a Bug</h1>
<p>Help us improve HeavensLive. Describe what went wrong and on which page.</p>
<input id="email" type="email" placeholder="Your email (optional)">
<select id="page">
<option value="">Which page?</option>
<option value="landing">Landing Page</option>
<option value="shop">Shop / Marketplace</option>
<option value="credon">Credon Wallet</option>
<option value="admin">Admin Panel</option>
<option value="create">Create Listing</option>
<option value="checkout">Checkout</option>
<option value="pricing">Pricing</option>
<option value="other">Other</option>
</select>
<textarea id="desc" placeholder="Describe the bug..."></textarea>
<label for="screenshot" style="color:var(--muted);font-size:.8rem;margin-bottom:4px;display:block">📸 Screenshot (optional)</label>
<input id="screenshot" type="file" accept="image/*" style="margin-bottom:10px">
<div id="msg" class="msg"></div>
<button class="btn" onclick="submitBug()">📤 Submit Report</button>
</div>
<script>
async function submitBug(){
  var b=document.querySelector('.btn'),m=document.getElementById('msg'),d=document.getElementById('desc').value.trim();
  if(!d){m.textContent='Please describe the bug.';m.className='msg err';m.style.display='block';return}
  b.disabled=true;b.textContent='Submitting...';
  var screenshot=null,file=document.getElementById('screenshot').files[0];
  if(file&&file.size<5*1024*1024){screenshot=await new Promise(function(ok){var r=new FileReader();r.onload=function(e){ok(e.target.result)};r.readAsDataURL(file)})}
  try{
    var r=await fetch('/api/shop/bug-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page:document.getElementById('page').value,description:d,email:document.getElementById('email').value,screenshot:screenshot})});
    var j=await r.json();
    m.textContent=j.success?'✅ Submitted! Thank you.':'❌ '+j.error;
    m.className=j.success?'msg ok':'msg err';m.style.display='block';
    if(j.success)document.getElementById('desc').value='';
  }catch(e){m.textContent='Server error';m.className='msg err';m.style.display='block'}
  b.disabled=false;b.textContent='📤 Submit Report';
}
</script>
</body></html>
