<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Offers — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71;--danger:#E74C3C;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:1.1rem;font-weight:700;color:var(--gold)}.nav-links{display:flex;gap:12px}.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem}.nav-links a:hover{color:var(--text)}
.container{max-width:1000px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05);margin-bottom:14px}
h1{color:var(--gold);font-size:1.5rem;margin-bottom:4px}.muted{color:var(--muted);font-size:.82rem}.back-link{color:var(--muted);font-size:.82rem;text-decoration:none;display:inline-block;margin-bottom:12px}.back-link:hover{color:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:.84rem}th{text-align:left;padding:9px 10px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.1);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}td{padding:10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.btn-sm{padding:5px 14px;font-size:.72rem;border-radius:6px;border:none;cursor:pointer;font-weight:600;margin-right:6px}.btn-sm.accept{background:rgba(46,204,113,.15);color:var(--success)}.btn-sm.accept:hover{background:rgba(46,204,113,.25)}.btn-sm.reject{background:rgba(231,76,60,.1);color:var(--danger)}.btn-sm.reject:hover{background:rgba(231,76,60,.2)}.btn-sm.counter{background:rgba(200,169,81,.12);color:var(--gold)}
.empty-state{text-align:center;padding:40px;color:var(--muted)}.empty-state a{color:var(--gold)}
.offer-amount{font-weight:700;color:var(--gold);font-size:1.05rem}
.counter-row{display:none;margin-top:8px;gap:8px;align-items:center}.counter-row.show{display:flex}.counter-row input{width:100px;padding:5px 8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text);font-size:.82rem}
</style></head><body>
<nav><div class="nav-brand" data-i18n="brand.title">📨 Offers</div><div class="nav-links"><a href="/shop/seller/dashboard">← Dashboard</a><a href="/shop/">Browse</a><a href="/shop/create">+ Post</a></div></nav>
<div class="container">
<a href="/shop/seller/dashboard" class="back-link">← Back to Dashboard</a>
<h1 data-i18n="brand.receivedOffers">📨 Received Offers</h1><p class="muted" data-i18n="page.sub_buyer_offers_on_your_listi">Buyer offers on your listings. Accept, reject, or counter-offer.</p>
<div class="card" style="margin-top:16px">
<table><thead><tr><th>Buyer</th><th>Listing</th><th>Offer Amount</th><th>Date</th><th>Actions</th></tr></thead>
<tbody id="offersBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody></table>
</div></div>
<script>
var T=localStorage.getItem("token");if(!T)location.href="/credon/";
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function loadOffers(){
  try{
    var d=await(await fetch('/api/shop/seller/offers',{headers:{Authorization:'Bearer '+T}})).json();var offers=d.offers||[];
    document.getElementById('offersBody').innerHTML=offers.length?offers.map(function(o,i){
      return'<tr><td>'+esc(o.buyer_name||o.buyer_email)+'</td><td><a href="/shop/listing/'+o.listing_id+'" style="color:var(--text);text-decoration:none">'+esc(o.title||'Listing')+'</a></td><td class="offer-amount">$'+(o.amount_cents/100).toFixed(2)+'</td><td>'+new Date(o.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</td><td><button class="btn-sm accept" onclick="respond('+o.id+',\'accepted\')">✅ Accept</button><button class="btn-sm counter" onclick="toggleCounter('+i+')">💬 Counter</button><button class="btn-sm reject" onclick="respond('+o.id+',\'rejected\')">❌ Reject</button></td></tr>';
    }).join(''):'<tr><td colspan="5" class="empty-state">No offers yet. When buyers make offers on your listings, they will appear here.</td></tr>';
  }catch(e){console.error(e)}
}
async function respond(id,status){await fetch('/api/shop/offers/'+id,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+T},body:JSON.stringify({status:status})});loadOffers()}
loadOffers();
</script><script src="/i18n.js"></script>
</body></html>
