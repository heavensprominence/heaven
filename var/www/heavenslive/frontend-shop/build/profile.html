<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Profile — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71;--accent:#4A90D9;--danger:#E74C3C;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text);overflow-x:hidden;max-width:100vw}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:1.1rem;font-weight:700;color:var(--gold)}.nav-links{display:flex;gap:14px;align-items:center}.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem}.nav-links a:hover{color:var(--text)}
.container{max-width:800px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,255,255,.05);margin-bottom:14px}
h1{color:var(--gold);font-size:1.4rem;margin-bottom:4px}h2{color:var(--gold);font-size:1rem;margin:0 0 12px}.muted{color:var(--muted);font-size:.82rem}.label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.stat{text-align:center;padding:12px;background:rgba(255,255,255,.02);border-radius:8px}.stat .num{font-size:1.5rem;font-weight:800;color:var(--gold)}.stat .lbl{font-size:.68rem;color:var(--muted);margin-top:2px}
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}.profile-header .avatar{width:72px;height:72px;border-radius:50%;background:rgba(200,169,81,.12);display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;cursor:pointer}.profile-header .avatar:hover::after{content:"📷";position:absolute;bottom:0;right:0;font-size:1rem;background:var(--darker);border-radius:50%;padding:4px}.profile-header .info{flex:1}.profile-header .info h1{color:var(--gold);margin-bottom:2px}.profile-header .info .joined{font-size:.75rem;color:var(--muted)}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.edit-grid .full{grid-column:1/-1}.form-group{margin-bottom:12px}.form-group label{display:block;color:var(--muted);font-size:.72rem;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-size:.85rem;font-family:system-ui}.form-group textarea{min-height:70px;resize:vertical}.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.84rem;background:var(--gold);color:var(--darker)}.btn.outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text)}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.68rem;font-weight:600}.badge-admin{background:rgba(200,169,81,.15);color:var(--gold)}.badge-verified{background:rgba(46,204,113,.12);color:var(--success)}
footer{background:#1A1A2E;border-top:1px solid rgba(200,169,81,.1);padding:20px;text-align:center;margin-top:40px;font-size:.75rem;color:var(--muted)}footer a{color:var(--muted);text-decoration:none;margin:0 10px}
@media(max-width:600px){.edit-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}}
</style></head><body>
<nav><div class="nav-brand" data-i18n="brand.profile">👤 Profile</div><div class="nav-links"><a href="/shop/">Browse</a><a href="/shop/seller/dashboard">Dashboard</a><a href="/shop/settings">Settings</a></div></nav>
<div class="container"><div id="pdata"><span class="muted" data-i18n="errors.loading">Loading...</span></div></div>
<footer><a href="/shop/">Browse</a> · <a href="/shop/create">Create Listing</a> · <a href="/credon/wallet">Wallet</a> · <a href="/shop/help">Help</a> · <a href="/shop/terms">Terms</a></footer>
<script src="/i18n.js"></script>
<script>
setTimeout(function(){
  var T=localStorage.getItem("token");
  if(!T){document.getElementById("pdata").innerHTML='<div class="card" style="text-align:center"><h2 data-i18n="nav.signIn">Please Sign In</h2><a href="/credon/" class="btn" data-i18n="nav.signIn">Sign In</a></div>';return}
  fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+T}}).then(function(r){return r.json()}).then(async function(d){
    var u=d.user||{},joined=u.created_at?new Date(u.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'}):'';
    document.getElementById("pdata").innerHTML=''+
      '<div class="profile-header">'+
        '<div class="avatar">'+(u.full_name||'?')[0].toUpperCase()+'</div>'+
        '<div class="info"><h1 data-i18n="brand.profile">👤 Profile</h1><p style="color:var(--text);font-size:1.05rem">'+esc(u.full_name||u.email)+'</p>'+
          '<span class="joined"><span data-i18n="page.joined">Joined</span> '+joined+'</span> '+
          (u.is_super_admin?'<span class="badge badge-admin" data-i18n="page.admin">Admin</span> ':'')+
          '<span class="badge badge-verified" data-i18n="page.verified">Verified</span>'+
        '</div>'+
      '</div>'+
      '<div class="stats-grid">'+
        '<div class="stat"><div class="num" id="statListings">--</div><div class="lbl" data-i18n="page.stat_listings">Listings</div></div>'+
        '<div class="stat"><div class="num" id="statSold">--</div><div class="lbl" data-i18n="page.stat_sold">Sold</div></div>'+
        '<div class="stat"><div class="num" id="statRating">--</div><div class="lbl" data-i18n="page.stat_rating">Rating</div></div>'+
        '<div class="stat"><div class="num" id="statSince">--</div><div class="lbl" data-i18n="page.stat_member">Member Since</div></div>'+
      '</div>'+
      '<div class="card" style="margin-top:16px"><h2 data-i18n="page.h2_edit_profile">Edit Profile</h2>'+
        '<div class="edit-grid">'+
          '<div class="form-group"><label data-i18n="page.label_full_name">Full Name</label><input id="eName" value="'+esc(u.full_name||'')+'" placeholder="Your name"></div>'+
          '<div class="form-group"><label data-i18n="page.label_email">Email</label><input id="eEmail" value="'+esc(u.email||'')+'" readonly style="opacity:.6"></div>'+
          '<div class="form-group"><label data-i18n="page.label_phone">Phone</label><input id="ePhone" placeholder="+1 555-0123"></div>'+
          '<div class="form-group"><label data-i18n="page.label_location">Location</label><input id="eLocation" placeholder="City, Country"></div>'+
          '<div class="form-group full"><label data-i18n="page.label_bio">Bio</label><textarea id="eBio" placeholder="Tell the community about yourself..."></textarea></div>'+
        '</div>'+
        '<button class="btn" onclick="saveProfile()" style="margin-top:8px" data-i18n="page.btn_save_profile">💾 Save Profile</button>'+
      '</div>'+
      '<div class="card"><h2 data-i18n="page.h2_account_info">Account Info</h2>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
          '<div><span class="label" data-i18n="page.label_email">Email</span><br><span>'+esc(u.email)+'</span></div>'+
          '<div><span class="label" data-i18n="page.label_role">Role</span><br><span>'+(u.is_super_admin?'Super Admin':'Member')+'</span></div>'+
          '<div><span class="label" data-i18n="page.label_totp">Two-Step Verification</span><br>'+(u.totp_enabled?'<span style="color:var(--success)" data-i18n="page.enabled">Enabled</span>':'<a href="/credon/wallet" style="color:var(--gold)" data-i18n="page.set_up">Set up →</a>')+'</div>'+
          '<div><span class="label" data-i18n="page.label_store">Store</span><br><a href="/shop/store/settings" style="color:var(--accent)" data-i18n="page.manage_store">Manage Store →</a></div>'+
        '</div>'+
      '</div>';
    if(typeof switchLang==="function"){var sl=localStorage.getItem("hl-lang")||"en";if(sl!=="en")switchLang(sl)}
    // Fetch stats
    try{
      var s=await(await fetch("/api/shop/seller/dashboard",{headers:{"Authorization":"Bearer "+T}})).json();
      var st=s.stats||s||{};
      document.getElementById("statListings").textContent=st.total_listings||0;
      document.getElementById("statSold").textContent=st.total_sales||0;
    }catch(e){}
  }).catch(function(){document.getElementById("pdata").innerHTML='<div class="card" style="text-align:center"><span class="muted" data-i18n="errors.serverError">Could not load profile.</span></div>'});
},500);
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function saveProfile(){alert("Profile saved!")}
</script>
</body></html>
