<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Register — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--accent:#4A90D9;--success:#2ECC71;--danger:#E74C3C;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text);overflow-x:hidden;max-width:100vw;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{max-width:440px;width:100%;padding:20px}.card{background:var(--card);border-radius:var(--radius);padding:32px;border:1px solid rgba(255,255,255,.05)}
h1{color:var(--gold);font-size:1.5rem;margin-bottom:4px;text-align:center}.muted{color:var(--muted);font-size:.82rem;text-align:center;margin-bottom:24px}
.form-group{margin-bottom:14px}.form-group label{display:block;color:var(--muted);font-size:.75rem;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.form-group input,.form-group textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-size:.85rem}.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
textarea{min-height:80px;resize:vertical}
.checkbox-group{display:flex;align-items:flex-start;gap:10px;padding:12px;background:rgba(200,169,81,.04);border:1px solid rgba(200,169,81,.1);border-radius:8px;margin-bottom:14px}.checkbox-group input[type=checkbox]{margin-top:3px;accent-color:var(--gold)}.checkbox-group label{color:var(--text);font-size:.84rem;cursor:pointer}.checkbox-group .hint{font-size:.72rem;color:var(--muted);margin-top:2px}
#credonReason{opacity:.4;pointer-events:none;transition:opacity .2s}#credonReason.enabled{opacity:1;pointer-events:auto}
.btn{width:100%;padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.9rem;background:var(--gold);color:var(--darker)}.btn:hover{opacity:.9}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:.82rem;display:none}.alert.error{background:rgba(231,76,60,.1);color:var(--danger);display:block}.alert.success{background:rgba(46,204,113,.1);color:var(--success);display:block}
.footer-links{text-align:center;margin-top:16px;font-size:.78rem;color:var(--muted)}.footer-links a{color:var(--gold);text-decoration:none}.footer-links a:hover{text-decoration:underline}
.back-link{display:block;text-align:center;margin-bottom:20px;color:var(--muted);font-size:.82rem;text-decoration:none}.back-link:hover{color:var(--gold)}
</style></head><body>
<div class="container">
  <a href="/shop/" class="back-link">← Back to Shop</a>
  <div class="card" id="regCard">
    <h1 data-i18n="nav.register">Create Account</h1>
    <p class="muted" data-i18n="page.sub_join_heavensmarket">Join HeavensMarket to buy, sell, and trade</p>
    <div class="alert" id="msg"></div>
    <form onsubmit="doRegister(event)">
      <div class="form-group"><label data-i18n="page.label_full_name">Full Name</label><input id="name" type="text" placeholder="Your name"></div>
      <div class="form-group"><label data-i18n="page.label_email">Email</label><input id="email" type="email" placeholder="you@email.com" required></div>
      <div class="form-group"><label data-i18n="page.label_password">Password</label><input id="password" type="password" placeholder="Min 8 characters" minlength="8" required></div>
      <div class="form-group"><label data-i18n="page.label_referral">Referral Code (optional)</label><input id="refCode" type="text" placeholder="Enter code if invited"></div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="joinCredon" onchange="toggleCredon()">
        <div><label for="joinCredon" data-i18n="page.label_join_credon">Join the Credon Test Phase?</label><div class="hint" data-i18n="page.hint_join_credon">Get early access to 84-currency wallet, treasury, and bonuses</div></div>
      </div>
      
      <div id="credonReason"><div class="form-group"><label data-i18n="page.label_join_reason">Why do you want to join?</label><textarea id="reason" placeholder="We review each request individually..."></textarea></div></div>
      
      <button type="submit" class="btn" data-i18n="page.btn_create_account">Create Account</button>
    </form>
    <div class="footer-links">Already have an account? <a href="/credon/">Sign In</a></div>
  </div>
  
  <div class="card" id="successCard" style="display:none;text-align:center">
    <h1 style="margin-bottom:12px">✅</h1>
    <h1 data-i18n="page.account_created">Account Created!</h1>
    <p class="muted" id="successMsg"></p>
    <a href="/shop/" class="btn" style="display:inline-block;width:auto;margin-top:16px;text-decoration:none" data-i18n="page.go_to_shop">Go to Shop</a>
  </div>
</div>
<script src="/i18n.js"></script>
<script>
function toggleCredon(){
  var cb=document.getElementById('joinCredon');
  var reason=document.getElementById('credonReason');
  if(cb.checked){reason.classList.add('enabled')}else{reason.classList.remove('enabled');document.getElementById('reason').value=''}
}

// Auto-fill referral from URL or localStorage
(function(){
  var ref=localStorage.getItem('hl-ref')||new URLSearchParams(window.location.search).get('ref')||'';
  if(ref){document.getElementById('refCode').value=ref;localStorage.setItem('hl-ref',ref)}
})();

async function doRegister(e){
  e.preventDefault();
  var msg=document.getElementById('msg');msg.className='alert';msg.textContent='';
  
  var joinCredon=document.getElementById('joinCredon').checked;
  if(joinCredon&&!document.getElementById('reason').value.trim()){
    msg.className='alert error';msg.textContent='Please tell us why you want to join the Credon test phase.';return
  }
  
  try{
    var r=await fetch('/api/auth/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:document.getElementById('email').value,
        password:document.getElementById('password').value,
        fullName:document.getElementById('name').value,
        referralCode:document.getElementById('refCode').value,
        joinReason:joinCredon?document.getElementById('reason').value:'',
        source:joinCredon?'credon':'shop'
      })
    });
    var d=await r.json();
    if(d.success){
      document.getElementById('regCard').style.display='none';
      document.getElementById('successCard').style.display='block';
      document.getElementById('successMsg').textContent=joinCredon?'Your Credon access request has been submitted for review. You can start shopping right away.':'You can now buy, sell, and trade on HeavensMarket.';
      if(d.token)localStorage.setItem('token',d.token);
    } else {
      msg.className='alert error';msg.textContent=d.error||'Registration failed';
    }
  }catch(e){msg.className='alert error';msg.textContent='Connection error. Please try again.'}
}
</script></body></html>
