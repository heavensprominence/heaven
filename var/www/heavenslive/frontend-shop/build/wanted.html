<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Wanted Items — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:12px 20px;display:flex;justify-content:space-between}
.nav-brand{font-size:1.2rem;font-weight:700;color:var(--gold)}.nav-links a{color:var(--text);text-decoration:none;font-size:.85rem;margin-left:12px}
.container{max-width:900px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,255,255,.05);margin-bottom:16px}
h1{color:var(--gold);margin-bottom:12px}h2{color:var(--gold);margin:12px 0 8px}.muted{color:var(--muted);font-size:.85rem}.label{font-size:.7rem;color:var(--muted);text-transform:uppercase}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:var(--gold);color:var(--darker)}.stat{font-size:2rem;font-weight:800;color:var(--gold)}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:768px){.grid3{grid-template-columns:1fr}}
</style></head><body>
<nav><div class="nav-brand" data-i18n="brand.title">HeavensMarket</div><div class="nav-links"><a href="/shop/">Browse</a><a href="/shop/cart">🛒</a><a href="/shop/create">+ Post</a><a href="/credon/wallet">Wallet</a><a href="/">Home</a></div></nav>
<div class="container"><h1 data-i18n="brand.wantedItems">📋 Wanted Items</h1><div class="card"><h2 data-i18n="page.h2_procurement_requests">Procurement Requests</h2><div id="wlist"><span class="muted">Loading...</span></div></div></div>
<script>var T=localStorage.getItem("token");if(!T)document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="text-align:center"><h2 style="color:#C8A951" data-i18n="page.h2_please_sign_in">Please Sign In</h2><a href="/credon/" class="btn">Sign In</a></div></div>';</script>
<script>fetch("/api/shop/listings?type=reverse_auction").then(r=>r.json()).then(d=>{document.getElementById("wlist").innerHTML=(d.listings||[]).map(l=>'<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)"><strong>'+l.title+'</strong><br><span class="muted">Budget: $'+(l.max_bid_cents/100).toFixed(2)+' | '+l.location_city+'</span></div>').join("")||'<span class="muted">No wanted items yet</span>'})</script>
<script src="/i18n.js"></script>
</body></html><footer style="background:#1A1A2E;border-top:1px solid rgba(200,169,81,.1);padding:20px;text-align:center;margin-top:40px"><a href="/shop/" style="color:var(--muted);text-decoration:none;font-size:.75rem;margin:0 10px">Browse</a><a href="/shop/help" style="color:var(--muted);text-decoration:none;font-size:.75rem;margin:0 10px">Help</a><a href="/shop/terms" style="color:var(--muted);text-decoration:none;font-size:.75rem;margin:0 10px">Terms</a></footer>
