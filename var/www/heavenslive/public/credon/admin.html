<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin — HeavensLive</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--radius:12px;--success:#2ECC71;--danger:#E74C3C;--accent:#4A90D9}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:12px 20px;display:flex;justify-content:space-between}
.nav-brand{font-size:1.1rem;font-weight:700;color:var(--gold)}.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem;margin-left:12px}
.container{max-width:960px;margin:0 auto;padding:20px}h1{color:var(--gold)}.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05);margin-bottom:12px}
.muted{color:var(--muted);font-size:.82rem}.btn{padding:8px 16px;background:var(--gold);color:var(--darker);border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.78rem}.btn:hover{opacity:.9}.btn-sm{padding:4px 10px;font-size:.7rem}.btn-danger{background:var(--danger);color:#fff}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}.tab{padding:8px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--muted);cursor:pointer;border-radius:6px;font-size:.78rem}.tab.on{background:var(--gold);color:var(--darker)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.stat{background:var(--card);padding:20px;text-align:center;border-radius:8px}.stat .num{font-size:1.8rem;font-weight:800;color:var(--gold)}.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:4px}
input,select,textarea{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text);font-size:.85rem;margin:6px 0}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.85rem;gap:8px}.row .col{flex:1}
.inline{display:inline;width:auto!important}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}.modal{background:var(--card);padding:24px;border-radius:var(--radius);max-width:400px;width:90%;border:1px solid rgba(200,169,81,.2)}
</style></head><body>
<nav><div class="nav-brand">⚙ Admin Panel</div><div class="nav-links"><a href="/credon/wallet">← Wallet</a><a href="/shop/">Shop</a><a href="/">Home</a></div></nav>
<div class="container"><h1>⚙ Admin Panel</h1>
<div class="tabs">
<button class="tab on" onclick="showTab('overview')">📊 Overview</button>
<button class="tab" onclick="showTab('categories')">📂 Categories</button>
<button class="tab" onclick="showTab('suggestions')">💡 Suggestions</button>
<button class="tab" onclick="showTab('users')">👥 Users</button>
<button class="tab" onclick="showTab('settings')">⚙️ Settings</button>
<button class="tab" onclick="showTab('analytics')">📈 Analytics</button>
<button class="tab" onclick="showTab('loans')">🏦 Loans</button>
<button class="tab" onclick="showTab('affiliate')">💸 Affiliate</button>
</div>
<div id="content" class="card"><p class="muted">Loading...</p></div>
</div>
<script>
var T=localStorage.getItem('token');if(!T)location.href='/credon/';
function F(u,o){o=o||{};var h=o.headers||{};if(T)h['authorization']='Bearer '+T;if(o.body&&typeof o.body=='object'){h['Content-Type']='application/json';o.body=JSON.stringify(o.body)}return fetch(u,{method:o.method||'GET',headers:h,body:o.body}).then(function(r){return r.json()})}
function showTab(n,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});if(el)el.classList.add('on');var f={overview:ov,categories:cat,suggestions:sug,users:usr,settings:set,analytics:analytics,loans:loans,affiliate:aff};if(f[n])f[n]()}
var c=document.getElementById('content');

function doMint(){
  var u=document.getElementById('mintUser').value.trim(),a=parseFloat(document.getElementById('mintAmount').value),r=document.getElementById('mintReason').value.trim();
  if(!a||a<=0){alert('Amount required');return}
  F('/api/admin/mint',{method:'POST',body:{amount_cents:Math.round(a*100),reason:r||'Admin mint',email:u||null}}).then(function(d){
    if(d.success)alert('Minted $'+a.toFixed(2));else alert(d.error||'Failed');
  });
}
function doBurn(){
  var u=document.getElementById('burnUser').value.trim(),a=parseFloat(document.getElementById('burnAmount').value),r=document.getElementById('burnReason').value.trim();
  if(!a||a<=0){alert('Amount required');return}
  F('/api/admin/burn',{method:'POST',body:{amount_cents:Math.round(a*100),reason:r||'Admin burn',email:u||null}}).then(function(d){
    if(d.success)alert('Burned $'+a.toFixed(2));else alert(d.error||'Failed');
  });
}
function ov(){F('/api/admin/public-stats').then(function(d){c.innerHTML=
'<div class="stats">'+
'<div class="stat"><div class="num">'+(d.total_users||0)+'</div><div class="lbl">Total Users</div></div>'+
'<div class="stat"><div class="num">'+(d.total_listings||0)+'</div><div class="lbl">Listings</div></div>'+
'<div class="stat"><div class="num">'+(d.total_disputes||0)+'</div><div class="lbl">Disputes</div></div>'+
'<div class="stat"><div class="num">'+(d.pending_credon||0)+'</div><div class="lbl">Credon Requests</div></div>'+
'<div class="stat"><div class="num">'+(d.pending_suggestions||0)+'</div><div class="lbl">Cat Suggestions</div></div>'+
'<div class="stat"><div class="num" id="treasuryVal">'+(d.total_treasury_cents?'$'+(d.total_treasury_cents/100).toFixed(2):'$0.00')+'</div><div class="lbl">Treasury</div></div></div>'+
'<div class="card"><h3>Platform Fee</h3><input id="pf" type="number" value="2" style="width:80px;display:inline"><span> %</span> <button class="btn" onclick="F(\'/api/admin/settings\',{method:\'POST\',body:{key:\'platform_fee\',value:document.getElementById(\'pf\').value}}).then(function(){alert(\'Saved\')})">Save</button></div>'+
'<div class="card"><h3>Pending Credon</h3><div id="credPend"></div></div>'+
'<div class="card"><h3>Pending Suggestions</h3><div id="sugPend"></div></div>'+
    '<div class="card"><h3>🏦 Treasury Management</h3><div class="grid2"><div><label class="muted">Mint</label><input id="mintUser" placeholder="User email (empty=treasury)"><input id="mintAmount" type="number" placeholder="Amount (USD)"><input id="mintReason" placeholder="Reason"><button class="btn" onclick="doMint()">💰 Mint</button></div><div><label class="muted">Burn</label><input id="burnUser" placeholder="User email (empty=treasury)"><input id="burnAmount" type="number" placeholder="Amount (USD)"><input id="burnReason" placeholder="Reason"><button class="btn btn-danger" onclick="doBurn()">🔥 Burn</button></div></div></div>';loadPend();}).catch(function(e){c.innerHTML='<p style="color:var(--danger)">'+e.message+'</p>'})}
function loadPend(){F('/api/admin/credon/pending').then(function(d){var p=d.pending||[],h='';p.forEach(function(r){h+='<div class="row"><span>'+r.email+' ('+r.join_reason+')</span><div><button class="btn btn-sm" onclick="approveCredon(\''+r.id+'\')">Approve</button><button class="btn btn-sm btn-danger" onclick="rejectCredon(\''+r.id+'\')">Reject</button></div></div>'});document.getElementById('credPend').innerHTML=h||'<p class="muted">None</p>'})}function approveCredon(id){F('/api/admin/credon/approve',{method:'POST',body:{user_id:id}}).then(function(){ov()})}function rejectCredon(id){F('/api/admin/credon/reject',{method:'POST',body:{user_id:id}}).then(function(){ov()})}

var LANGS=['en','ar','fa','fr','zh','es','de','ja','ko','pt','ru','hi','vi','tr','ur','sv','tl'];
var LANGFLAGS={en:'🇬🇧',ar:'🇸🇦',fa:'🇮🇷',fr:'🇫🇷',zh:'🇨🇳',es:'🇪🇸',de:'🇩🇪',ja:'🇯🇵',ko:'🇰🇷',pt:'🇧🇷',ru:'🇷🇺',hi:'🇮🇳',vi:'🇻🇳',tr:'🇹🇷',ur:'🇵🇰',sv:'🇸🇪',tl:'🇵🇭'};
var LANGNAMES={en:'English',ar:'العربية',fa:'فارسی',fr:'Français',zh:'中文',es:'Español',de:'Deutsch',ja:'日本語',ko:'한국어',pt:'Português',ru:'Русский',hi:'हिन्दी',vi:'Tiếng Việt',tr:'Türkçe',ur:'اردو',sv:'Svenska',tl:'Tagalog'};

function cat(){F('/api/shop/categories').then(function(d){var cats=d.categories||[],h='<div class="card"><h3>Add Category</h3><input id="catName" placeholder="Name"><select id="catParent"><option value="">Top-level</option>'+cats.map(function(x){return'<option value="'+x.slug+'">'+x.name+'</option>'}).join('')+'</select><button class="btn" onclick="addCat()">+ Add</button></div>';cats.forEach(function(x){h+='<div><div class="row"><span><strong>'+x.name+'</strong> <span class="muted">'+x.slug+'</span></span><span><span class="muted">'+x.count+' listings</span>'+(x.subcategory_count>0?' <button class="btn btn-sm" onclick="expCat(\''+x.slug+'\',this)">▶</button>':'')+' <button class="btn btn-sm" onclick="showTranslations(\''+x.slug+'\',\''+x.name.replace(/'/g,"\\'")+'\')">🌐</button> <button class="btn btn-sm" onclick="autoTranslateCat(\''+x.slug+'\',\''+x.name.replace(/'/g,"\\'")+'\')" title="Auto-translate">🔄</button> <button class="btn btn-sm" onclick="editCat(\''+x.slug+'\',\''+x.name.replace(/'/g,"\\'")+'\')">✏️</button> <button class="btn btn-sm btn-danger" onclick="delCat(\''+x.slug+'\')">×</button></span></div><div id="kids-'+x.slug+'" style="padding-left:20px"></div></div>'});c.innerHTML=h}).catch(function(e){c.innerHTML='<p style="color:var(--danger)">Error: '+e.message+'</p>'})}

function showTranslations(slug,name){
  F('/api/shop/categories/translations/all').then(function(d){
    var trans=(d.translations||[]).filter(function(t){return t.category===slug});
    var map={};trans.forEach(function(t){map[t.language_code]=t.translated_name||''});
    var h='<div class="modal-bg" onclick="this.remove()"><div class="modal" onclick="event.stopPropagation()" style="max-width:600px;max-height:80vh;overflow-y:auto"><h3 style="color:var(--gold);margin-bottom:12px">🌐 '+name+'</h3><p class="muted">Click a flag to edit translation. Green = has translation, Gray = missing.</p><div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0" id="transFlags">';
    LANGS.forEach(function(l){
      var hasT=map[l]&&map[l].length>0;
      h+='<button onclick="editTranslation(\''+slug+'\',\''+l+'\',\''+(map[l]||'').replace(/'/g,"\\'")+'\')" style="padding:8px 12px;border-radius:8px;border:1px solid '+(hasT?'var(--success)':'rgba(255,255,255,0.1))')+';background:'+(hasT?'rgba(46,204,113,0.1)':'transparent')+';color:var(--text);cursor:pointer;font-size:0.85rem">'+LANGFLAGS[l]+' '+LANGNAMES[l]+' '+(hasT?'✅':'')+'</button>';
    });
    h+='</div></div></div>';
    var div=document.createElement('div');div.innerHTML=h;document.body.appendChild(div.firstChild);
  });
}

function autoTranslateCat(slug,name){if(!confirm('Auto-translate "'+name+'" to all 16 languages?'))return;F('/api/shop/categories/translate',{method:'POST',body:{slug:slug,name:name}}).then(function(d){if(d.success){alert('Translated!');cat()}else alert(d.error||'Failed')})}

function editTranslation(slug,lang,current){
  var val=prompt('Translation for '+LANGNAMES[lang]+' ('+lang+'):',current||'');
  if(val===null || val===current)return;
  var catName=document.querySelector('.modal h3');var name=catName?catName.textContent.replace('🌐 ','').trim():slug;
  F('/api/shop/categories/admin/update/'+slug,{method:'PUT',body:{name:val,lang:lang}}).then(function(d){
    if(d.success){document.querySelector('.modal-bg').remove();alert('Saved!')}
    else alert(d.error||'Failed');
  });
}
function addCat(){var n=document.getElementById('catName').value.trim(),p=document.getElementById('catParent').value;if(!n)return;F('/api/shop/categories/admin/create',{method:'POST',body:{name:n,parent_category:p||null}}).then(function(d){if(d.success)cat();else alert(d.error||'Failed')})}
function expCat(slug,btn){var el=document.getElementById('kids-'+slug);if(el.innerHTML){el.style.display=el.style.display==='block'?'none':'block';btn.textContent=el.style.display==='block'?'▼':'▶';return}F('/api/shop/categories/subcategories/'+slug).then(function(d){var s=d.subcategories||[];el.innerHTML=s.map(function(x){return'<div class="row" style="font-size:.78rem">'+x.name+' <span class="muted">'+x.slug+'</span> <button class="btn btn-sm" onclick="autoTranslateCat(\''+x.slug+'\',\''+(x.name||'').replace(/'/g,"\\'")+'\')">🔄</button> <button class="btn btn-sm" onclick="showTranslations(\''+x.slug+'\',\''+(x.name||'').replace(/'/g,"\\'")+'\')">🌐</button> <button class="btn btn-sm" onclick="editCat(\''+x.slug+'\',\''+(x.name||'').replace(/'/g,"\\'")+'\')">✏️</button> <button class="btn btn-sm btn-danger" onclick="delCat(\''+x.slug+'\')">×</button></div>'}).join('')||'<span class="muted">None</span>';el.style.display='block';btn.textContent='▼'})}
function editCat(slug,name){var n=prompt('Edit category name:',name);if(!n||n===name)return;F('/api/shop/categories/admin/update/'+slug,{method:'PUT',body:{name:n}}).then(function(d){if(d.success)cat();else alert(d.error||'Failed')})}
function delCat(slug){if(!confirm('Delete '+slug+'?'))return;F('/api/shop/categories/admin/delete/'+slug,{method:'DELETE'}).then(function(d){if(d.success)cat();else alert(d.error||'Failed')})}

function sug(){c.innerHTML='<div class="card"><h3>Category Suggestions</h3><div id="sugList"></div></div>';F('/api/shop/categories/suggestions/pending').then(function(d){var s=d.suggestions||[],h='';s.forEach(function(x){h+='<div class="row"><span>'+x.name+' <span class="muted">by '+x.email+'</span></span><button class="btn btn-sm" onclick="approveSug(\''+x.id+'\')">Approve</button></div>'});document.getElementById('sugList').innerHTML=h||'<p class="muted">None</p>'})}
function approveSug(id){F('/api/shop/categories/suggestions/pending/'+id+'/approve',{method:'POST'}).then(function(d){if(d.success)sug();else alert(d.error||'Failed')})}

function usr(){c.innerHTML='<p class="muted">Loading users...</p>';F('/api/admin/users?limit=100').then(function(d){var u=d.users||[],h='<div class="card"><h3>Users ('+u.length+')</h3><input id="userSearch" placeholder="Search by email..." oninput="usrSearch()" style="margin-bottom:8px"><div id="usrList">'+u.map(function(x){return'<div class="row"><span>'+x.email+' <span class="muted">'+(x.full_name||'')+'</span></span><span><span class="muted">'+(x.subscription_plan||'free')+'</span> <button class="btn btn-sm btn-danger" onclick="deleteUser(\''+x.id+'\')">🗑</button> <button class="btn btn-sm" onclick="suspendUser(\''+x.id+'\')">Suspend</button></span></div>'}).join('')+'</div></div>';c.innerHTML=h;window._usrData=u}).catch(function(){c.innerHTML='<p style="color:var(--danger)">Could not load users</p>'})}
function usrSearch(){var q=document.getElementById('userSearch').value.toLowerCase(),u=(window._usrData||[]).filter(function(x){return x.email.toLowerCase().indexOf(q)>=0});document.getElementById('usrList').innerHTML=u.map(function(x){return'<div class="row"><span>'+x.email+'</span><button class="btn btn-sm btn-danger" onclick="deleteUser(\''+x.id+'\')">🗑</button> <button class="btn btn-sm" onclick="suspendUser(\''+x.id+'\')">Suspend</button></div>'}).join('')||'<p class="muted">No matches</p>'}
function deleteUser(id){if(!confirm('PERMANENTLY DELETE this user? This cannot be undone.'))return;F('/api/admin/users/'+id,{method:'DELETE'}).then(function(d){if(d.success)usr();else alert(d.error||'Failed')})}
function suspendUser(id){var r=prompt('Suspend reason:');if(!r)return;var d=prompt('Duration (days):');F('/api/admin/suspend',{method:'POST',body:{user_id:id,reason:r,duration_days:parseInt(d)||7}}).then(function(x){if(x.success)usr();else alert(x.error||'Failed')})}

function saveAffiliate(){var d={signup_bonus:document.getElementById('affBonus').value,purchase_commission_rate:document.getElementById('affPurchase').value,sale_commission_rate:document.getElementById('affSale').value};F('/api/admin/affiliate/settings',{method:'POST',body:d}).then(function(){alert('Saved!')})}
function set(){F('/api/admin/settings').then(function(d){var s=d.settings||{},pf=s.platform_fee||'2',ab=s.signup_bonus||'5',cr=s.commission_rate||'2';c.innerHTML='<div class="card"><h3>Platform Fee</h3><p class="muted">Marketplace commission on every sale:</p><input id="setPF" type="number" value="'+pf+'" style="width:80px;display:inline"><span> %</span></div><div class="card"><h3>Affiliate Defaults</h3><label>Signup Bonus (Credon-USD)</label><input id="setAB" type="number" value="'+ab+'"><label>Commission Rate (%)</label><input id="setCR" type="number" value="'+cr+'"></div><button class="btn" onclick="saveSets()">Save All Settings</button>'}).catch(function(){c.innerHTML='<p class="muted">Settings unavailable</p>'})}
function saveSets(){var d={platform_fee:document.getElementById('setPF').value,signup_bonus:document.getElementById('setAB').value,commission_rate:document.getElementById('setCR').value};F('/api/admin/settings',{method:'POST',body:d}).then(function(){alert('Saved!')})}

function loans(){
  c.innerHTML='<div class="card"><h3>🏦 Pending Loan Applications</h3><div id="loanPend"></div></div><div class="card"><h3>Active Loans</h3><div id="loanActive"></div></div>';
  F('/api/admin/loans/pending').then(function(d){
    var l=d.loans||[],h='';
    l.forEach(function(x){h+='<div class="card"><div class="row"><strong>'+x.email+'</strong><span>$'+(x.amount_cents/100).toFixed(2)+'</span></div><div class="row"><span class="muted">'+x.reason+'</span></div><div class="row"><input id="loanAmt_'+x.id+'" type="number" value="'+(x.amount_cents/100).toFixed(2)+'" step="0.01" placeholder="Amount"><input id="loanRate_'+x.id+'" type="number" value="0" step="0.1" min="-100" max="5" placeholder="Rate %" style="width:80px;display:inline"></div><button class="btn btn-sm" onclick="approveLoan("'+x.id+'")">Approve</button></div>'});
    document.getElementById('loanPend').innerHTML=h||'<p class="muted">None</p>';
  });
  F('/api/admin/loans/active').then(function(d){
    var l=d.loans||[],h='';
    l.forEach(function(x){
      var days=Math.max(1,Math.ceil((Date.now()-new Date(x.start_date).getTime())/86400000));
      var int=Math.round(x.principal_cents*(x.interest_rate_percent/100/365)*days);
      h+='<div class="row"><span>'+x.email+'</span><span>$'+(x.principal_cents/100).toFixed(2)+' (owed: $'+((x.remaining_cents+int)/100).toFixed(2)+' | '+days+'d)</span></div>';
    });
    document.getElementById('loanActive').innerHTML=h||'<p class="muted">No active loans</p>';
  });
}
function approveLoan(id){
  var amt=parseFloat(document.getElementById('loanAmt_'+id).value);
  var rate=parseFloat(document.getElementById('loanRate_'+id).value);
  if(!amt||amt<=0){alert('Amount required');return}
  F('/api/admin/loans/'+id+'/approve',{method:'POST',body:{amount_cents:Math.round(amt*100),interest_rate_percent:rate||0}}).then(function(d){
    if(d.success)loans();else alert(d.error||'Failed');
  });
}
function analytics(){
  F('/api/admin/public-stats').then(function(d){
    c.innerHTML='<div class="stats">'+
      '<div class="stat"><div class="num">'+(d.total_users||0)+'</div><div class="lbl">Total Users</div></div>'+
      '<div class="stat"><div class="num">'+(d.total_listings||0)+'</div><div class="lbl">Active Listings</div></div>'+
      '<div class="stat"><div class="num">'+(d.total_disputes||0)+'</div><div class="lbl">Open Disputes</div></div>'+
      '<div class="stat"><div class="num">'+(d.pending_credon||0)+'</div><div class="lbl">Pending Credon</div></div>'+
      '<div class="stat"><div class="num">'+(d.pending_suggestions||0)+'</div><div class="lbl">Category Suggestions</div></div>'+
      '<div class="stat"><div class="num">'+(d.total_revenue_cents?'$'+(d.total_revenue_cents/100).toFixed(2):'$0.00')+'</div><div class="lbl">Revenue</div></div>'+
    '</div>'+
    '<div class="card"><h3>Site Health</h3><p class="muted">Server online · PostgreSQL connected · Exchange rates updating every 30min · 17 languages active · 84 currencies tracked</p></div>';
  }).catch(function(e){c.innerHTML='<p style="color:var(--danger)">'+e.message+'</p>'});
}
function aff(){c.innerHTML='<div class="card"><h3>💸 Affiliate Management</h3><div id="affData"></div></div>';F('/api/admin/affiliate/settings').then(function(d){var s=(d&&d.setting_value)?(typeof d.setting_value==='string'?JSON.parse(d.setting_value):d.setting_value):d||{};document.getElementById('affData').innerHTML='<div class="row"><span>Signup Bonus</span><span>'+(s.signup_bonus||5)+' Credon</span></div><div class="row"><span>Purchase Commission</span><span>'+(s.purchase_commission_rate||2)+'%</span></div><div class="row"><span>Sale Commission</span><span>'+(s.sale_commission_rate||2)+'%</span></div><div class="card" style="margin-top:12px"><h3>Update Rates</h3><label>Signup Bonus (Credon)</label><input id="affBonus" type="number" value="'+(s.signup_bonus||5)+'"><label>Purchase Commission (%)</label><input id="affPurchase" type="number" value="'+(s.purchase_commission_rate||2)+'"><label>Sale Commission (%)</label><input id="affSale" type="number" value="'+(s.sale_commission_rate||2)+'"><button class="btn" onclick="saveAffiliate()" style="width:100%">Save Rates</button></div>'}).catch(function(){document.getElementById('affData').innerHTML='<p class="muted">Could not load</p>'})}

ov();
</script>
</body></html>
