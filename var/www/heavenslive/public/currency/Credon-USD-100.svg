<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <pattern id="guilloche" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q5 0 10 10 Q15 20 20 10" fill="none" stroke="#2d5a27" stroke-width="0.5" opacity="0.3"/>
      <path d="M0 10 Q5 20 10 10 Q15 0 20 10" fill="none" stroke="#1a3d15" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <pattern id="microprint" x="0" y="0" width="80" height="8" patternUnits="userSpaceOnUse">
      <text x="0" y="6" font-size="4" fill="#1a3d15" opacity="0.4" font-family="monospace">CREDON-USD CREDON-USD CREDON-USD</text>
    </pattern>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e0"/>
      <stop offset="50%" stop-color="#d4e8c5"/>
      <stop offset="100%" stop-color="#c8e0b5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="340" rx="8" fill="url(#bgGrad)" stroke="#2d5a27" stroke-width="2"/>
  <rect x="5" y="5" width="790" height="330" rx="6" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
  <rect x="8" y="8" width="784" height="324" rx="5" fill="none" stroke="#2d5a27" stroke-width="0.3"/>

  <!-- Guilloche border patterns -->
  <rect x="12" y="12" width="776" height="316" rx="3" fill="url(#guilloche)" opacity="0.5"/>
  <rect x="15" y="15" width="770" height="310" rx="2" fill="none" stroke="#1a3d15" stroke-width="0.8"/>

  <!-- Corner ornaments -->
  <g opacity="0.6">
    <circle cx="55" cy="55" r="30" fill="none" stroke="#2d5a27" stroke-width="1.5"/>
    <circle cx="55" cy="55" r="25" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
    <circle cx="55" cy="55" r="20" fill="none" stroke="#2d5a27" stroke-width="0.3"/>
    <text x="55" y="60" text-anchor="middle" font-size="28" font-weight="900" fill="#1a3d15" font-family="serif">100</text>
    <!-- Mirror to other corners -->
    <circle cx="745" cy="55" r="30" fill="none" stroke="#2d5a27" stroke-width="1.5"/>
    <circle cx="745" cy="55" r="25" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
    <circle cx="745" cy="55" r="20" fill="none" stroke="#2d5a27" stroke-width="0.3"/>
    <text x="745" y="60" text-anchor="middle" font-size="28" font-weight="900" fill="#1a3d15" font-family="serif">100</text>
    <circle cx="55" cy="285" r="30" fill="none" stroke="#2d5a27" stroke-width="1.5"/>
    <circle cx="55" cy="285" r="25" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
    <text x="55" y="290" text-anchor="middle" font-size="28" font-weight="900" fill="#1a3d15" font-family="serif">100</text>
    <circle cx="745" cy="285" r="30" fill="none" stroke="#2d5a27" stroke-width="1.5"/>
    <circle cx="745" cy="285" r="25" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
    <text x="745" y="290" text-anchor="middle" font-size="28" font-weight="900" fill="#1a3d15" font-family="serif">100</text>
  </g>

  <!-- LEFT SIDE: Watermark/security area -->
  <rect x="50" y="90" width="140" height="160" rx="40" fill="rgba(255,255,255,0.4)" stroke="#2d5a27" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="120" y="175" text-anchor="middle" font-size="80" fill="#1a3d15" opacity="0.08" font-weight="900">₡</text>
  <text x="120" y="200" text-anchor="middle" font-size="10" fill="#1a3d15" opacity="0.15" font-family="monospace">WATERMARK</text>

  <!-- CENTER: Main text -->
  <rect x="230" y="60" width="340" height="220" rx="4" fill="rgba(255,255,255,0.3)"/>
  
  <text x="400" y="105" text-anchor="middle" font-size="22" fill="#1a3d15" font-family="serif" font-weight="bold" letter-spacing="6">CREDON-USD</text>
  <line x1="240" y1="115" x2="560" y2="115" stroke="#2d5a27" stroke-width="0.5"/>
  
  <text x="400" y="145" text-anchor="middle" font-size="14" fill="#2d5a27" font-family="serif" font-style="italic">ONE HUNDRED</text>
  <text x="400" y="170" text-anchor="middle" font-size="18" fill="#1a3d15" font-family="serif" font-weight="bold">CREDON DOLLARS</text>
  
  <line x1="280" y1="182" x2="520" y2="182" stroke="#2d5a27" stroke-width="0.3"/>
  
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#2d5a27" font-family="serif" letter-spacing="4" opacity="0.7">DIVINELY UNDERWRITTEN</text>
  <text x="400" y="222" text-anchor="middle" font-size="38" fill="#1a3d15" font-family="serif" font-weight="900">100</text>
  <text x="400" y="245" text-anchor="middle" font-size="9" fill="#2d5a27" font-family="serif" letter-spacing="2" opacity="0.7">HL • 2026 • SERIES A</text>

  <!-- RIGHT SIDE: Portrait oval (empty) -->
  <ellipse cx="670" cy="170" rx="55" ry="65" fill="rgba(255,255,255,0.5)" stroke="#2d5a27" stroke-width="1"/>
  <text x="670" y="175" text-anchor="middle" font-size="11" fill="#2d5a27" opacity="0.3" font-family="serif">PORTRAIT</text>

  <!-- Serial Numbers -->
  <text x="620" y="35" font-size="9" fill="#1a3d15" font-family="monospace" opacity="0.7">HL 000001 A</text>
  <text x="620" y="320" font-size="9" fill="#1a3d15" font-family="monospace" opacity="0.7">HL 000001 A</text>

  <!-- Microprint strip -->
  <rect x="200" y="55" width="400" height="6" fill="url(#microprint)" opacity="0.6"/>
  <rect x="200" y="282" width="400" height="6" fill="url(#microprint)" opacity="0.6"/>

  <!-- Bottom text -->
  <text x="400" y="310" text-anchor="middle" font-size="7" fill="#1a3d15" opacity="0.4" font-family="serif">THIS NOTE IS LEGAL TENDER FOR ALL CREDON TRANSACTIONS • HEAVENSLIVE 2026</text>

  <!-- Guilloche vignette center -->
  <g transform="translate(400,170)" opacity="0.06">
    <circle r="80" fill="none" stroke="#1a3d15" stroke-width="0.5"/>
    <circle r="70" fill="none" stroke="#2d5a27" stroke-width="0.3"/>
    <circle r="60" fill="none" stroke="#1a3d15" stroke-width="0.2"/>
  </g>
</svg>
