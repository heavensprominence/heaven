<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <pattern id="bcp" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.5" fill="#F7931A" opacity="0.06"/>
      <path d="M0 0 L12 12 M12 0 L0 12" stroke="#F2A900" stroke-width="0.12" opacity="0.04"/>
    </pattern>
    <linearGradient id="bcb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/><stop offset="50%" stop-color="#16213e"/><stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="bcg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F7931A" stop-opacity="0"/><stop offset="50%" stop-color="#F7931A" stop-opacity="0.25"/><stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="0" y="0" width="760" height="300" rx="8" fill="url(#bcb)" stroke="#F7931A" stroke-width="1.5"/>
  <rect x="5" y="5" width="750" height="290" rx="6" fill="none" stroke="#F2A900" stroke-width="0.4" opacity="0.4"/>
  <rect x="12" y="12" width="736" height="276" rx="3" fill="url(#bcp)" opacity="0.35"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#F7931A">
    <line x1="0" y1="60" x2="760" y2="60"/><line x1="0" y1="120" x2="760" y2="120"/>
    <line x1="0" y1="180" x2="760" y2="180"/><line x1="0" y1="240" x2="760" y2="240"/>
  </g>

  <circle cx="380" cy="150" r="70" fill="url(#bcg)" opacity="0.2"/>
  <circle cx="380" cy="150" r="55" fill="none" stroke="#F7931A" stroke-width="0.4" opacity="0.3"/>

  <text x="380" y="38" text-anchor="middle" font-size="18" fill="#F7931A" font-family="monospace" font-weight="bold" letter-spacing="10" filter="url(#gl)">CREDON-BTC</text>
  <text x="380" y="54" text-anchor="middle" font-size="7" fill="#F2A900" font-family="monospace" letter-spacing="4" opacity="0.55">DECENTRALIZED DIGITAL CURRENCY</text>

  <!-- Denomination in μBTC -->
  <text x="380" y="105" text-anchor="middle" font-size="11" fill="#F2A900" font-family="monospace" opacity="0.65">ONE THOUSAND MICRO-BITCOIN</text>
  <text x="380" y="158" text-anchor="middle" font-size="42" fill="#F7931A" font-family="monospace" font-weight="900" filter="url(#gl)">1,000 μBTC</text>
  <text x="380" y="185" text-anchor="middle" font-size="13" fill="#F2A900" font-family="monospace" opacity="0.6">= 0.00100000 BTC</text>
  
  <text x="380" y="215" text-anchor="middle" font-size="7" fill="#F2A900" font-family="monospace" letter-spacing="3" opacity="0.35">DIVINELY UNDERWRITTEN ★ 2026 ★ SERIES A</text>

  <!-- Left: QR -->
  <rect x="50" y="90" width="95" height="95" rx="3" fill="rgba(247,147,26,0.06)" stroke="#F7931A" stroke-width="0.35" opacity="0.35"/>
  <g opacity="0.1" fill="#F7931A">
    <rect x="65" y="105" width="7" height="7"/><rect x="79" y="105" width="7" height="7"/><rect x="93" y="105" width="7" height="7"/><rect x="107" y="105" width="7" height="7"/><rect x="121" y="105" width="7" height="7"/>
    <rect x="65" y="119" width="7" height="7"/><rect x="107" y="119" width="7" height="7"/><rect x="121" y="119" width="7" height="7"/>
    <rect x="65" y="133" width="7" height="7"/><rect x="79" y="133" width="7" height="7"/><rect x="93" y="133" width="7" height="7"/><rect x="121" y="133" width="7" height="7"/>
    <rect x="79" y="147" width="7" height="7"/><rect x="93" y="147" width="7" height="7"/>
    <rect x="65" y="161" width="7" height="7"/><rect x="107" y="161" width="7" height="7"/><rect x="121" y="161" width="7" height="7"/>
  </g>

  <!-- Right: hash block -->
  <rect x="610" y="95" width="105" height="55" rx="3" fill="rgba(247,147,26,0.05)" stroke="#F2A900" stroke-width="0.3" opacity="0.3"/>
  <text x="662" y="115" text-anchor="middle" font-size="7" fill="#F7931A" font-family="monospace" opacity="0.25">BLOCK #000001</text>
  <text x="662" y="128" text-anchor="middle" font-size="6" fill="#F2A900" font-family="monospace" opacity="0.2">HASH: 0xHL...</text>
  <text x="662" y="141" text-anchor="middle" font-size="6" fill="#F7931A" font-family="monospace" opacity="0.18">μBTC</text>

  <!-- Corner stamps -->
  <rect x="20" y="70" width="55" height="28" rx="3" fill="#F7931A" opacity="0.85"/>
  <text x="47" y="80" text-anchor="middle" font-size="8" fill="#0f0f1a" font-family="monospace" font-weight="900">CREDON</text>
  <text x="47" y="92" text-anchor="middle" font-size="7" fill="rgba(15,15,26,0.7)" font-family="monospace">1000μ</text>

  <rect x="685" y="70" width="55" height="28" rx="3" fill="#F7931A" opacity="0.85"/>
  <text x="712" y="80" text-anchor="middle" font-size="8" fill="#0f0f1a" font-family="monospace" font-weight="900">CREDON</text>
  <text x="712" y="92" text-anchor="middle" font-size="7" fill="rgba(15,15,26,0.7)" font-family="monospace">1000μ</text>

  <!-- Serial -->
  <text x="540" y="22" font-size="8" fill="#F7931A" font-family="monospace" opacity="0.4">HL-BTC-μ001-A</text>
  <text x="540" y="288" font-size="8" fill="#F7931A" font-family="monospace" opacity="0.4">HL-BTC-μ001-A</text>

  <!-- Bottom -->
  <rect x="40" y="268" width="680" height="2" fill="#F7931A" opacity="0.06"/>
  <text x="380" y="282" text-anchor="middle" font-size="5" fill="#F7931A" font-family="monospace" opacity="0.15">BLOCKCHAIN-VERIFIED ★ SHA-256 ★ DECENTRALIZED LEDGER ★ CREDON NETWORK</text>
  <text x="380" y="294" text-anchor="middle" font-size="4.5" fill="#F2A900" opacity="0.1" font-family="monospace">CRYPTOGRAPHICALLY SECURED DIGITAL NOTE VERIFIABLE ON THE CREDON BLOCKCHAIN</text>
</svg>
