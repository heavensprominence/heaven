<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <pattern id="jpyPat" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M15 0 L15 30 M0 15 L30 15" stroke="#4a0080" stroke-width="0.3" opacity="0.12"/>
      <circle cx="15" cy="15" r="10" fill="none" stroke="#6b24b0" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="jpyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="50%" stop-color="#ede0ff"/>
      <stop offset="100%" stop-color="#e0d0f5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="340" rx="8" fill="url(#jpyBg)" stroke="#4a0080" stroke-width="2"/>
  <rect x="5" y="5" width="790" height="330" rx="6" fill="none" stroke="#2d0050" stroke-width="0.5"/>
  <rect x="12" y="12" width="776" height="316" rx="3" fill="url(#jpyPat)" opacity="0.4"/>

  <!-- Cherry blossom pattern -->
  <g opacity="0.08">
    <circle cx="100" cy="120" r="8" fill="#6b24b0"/>
    <circle cx="160" cy="200" r="5" fill="#6b24b0"/>
    <circle cx="680" cy="100" r="7" fill="#6b24b0"/>
    <circle cx="720" cy="240" r="6" fill="#6b24b0"/>
    <circle cx="400" cy="70" r="5" fill="#6b24b0"/>
  </g>

  <!-- Left seal -->
  <g transform="translate(100,170)" opacity="0.2">
    <circle r="45" fill="none" stroke="#4a0080" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#4a0080" stroke-width="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#2d0050" font-family="serif">CREDON</text>
    <text x="0" y="18" text-anchor="middle" font-size="10" fill="#4a0080" font-family="serif">JPY</text>
  </g>

  <!-- CENTER: Japanese text -->
  <text x="400" y="85" text-anchor="middle" font-size="28" fill="#2d0050" font-family="serif" font-weight="bold" letter-spacing="4">クレドン円</text>
  <text x="400" y="108" text-anchor="middle" font-size="16" fill="#4a0080" font-family="serif">CREDON-JPY</text>
  
  <line x1="180" y1="118" x2="620" y2="118" stroke="#6b24b0" stroke-width="0.4"/>
  
  <text x="400" y="150" text-anchor="middle" font-size="14" fill="#4a0080" font-family="serif">壱万円</text>
  <text x="400" y="175" text-anchor="middle" font-size="12" fill="#2d0050" font-family="serif">TEN THOUSAND CREDON YEN</text>
  
  <text x="400" y="210" text-anchor="middle" font-size="48" fill="#4a0080" font-family="serif" font-weight="900">10,000</text>
  
  <text x="400" y="235" text-anchor="middle" font-size="8" fill="#6b24b0" font-family="serif" letter-spacing="4" opacity="0.5">DIVINELY UNDERWRITTEN</text>
  <text x="400" y="252" text-anchor="middle" font-size="7" fill="#4a0080" opacity="0.35">HEAVENSLIVE • 2026 • HL000001J</text>

  <!-- Right: Phoenix/phoenix-like motif -->
  <g transform="translate(680,170)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="40" ry="55" fill="none" stroke="#4a0080" stroke-width="1.5"/>
    <ellipse cx="0" cy="-15" rx="25" ry="30" fill="none" stroke="#6b24b0" stroke-width="0.5"/>
    <circle cx="0" cy="-35" r="5" fill="#2d0050"/>
  </g>

  <!-- Corner stamps -->
  <g>
    <rect x="35" y="25" width="55" height="35" rx="3" fill="#4a0080" opacity="0.9"/>
    <text x="62" y="40" text-anchor="middle" font-size="10" fill="white" font-family="serif">CREDON</text>
    <text x="62" y="52" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)" font-family="serif">10000</text>
    
    <rect x="710" y="25" width="55" height="35" rx="3" fill="#4a0080" opacity="0.9"/>
    <text x="737" y="40" text-anchor="middle" font-size="10" fill="white" font-family="serif">CREDON</text>
    <text x="737" y="52" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)" font-family="serif">10000</text>
  </g>

  <!-- Microprint strip -->
  <rect x="120" y="270" width="560" height="3" fill="#4a0080" opacity="0.15"/>
  <text x="400" y="268" text-anchor="middle" font-size="3.5" fill="#4a0080" opacity="0.2" font-family="monospace">CREDON-JPY ★ クレドン円 ★ 2026</text>

  <text x="400" y="310" text-anchor="middle" font-size="7" fill="#4a0080" opacity="0.35">この紙幣はすべてのクレドン取引に有効です • HEAVENSLIVE 2026</text>
</svg>
