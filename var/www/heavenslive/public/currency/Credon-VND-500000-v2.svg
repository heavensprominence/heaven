  </defs>

  <!-- FRONT -->
  <rect x="0" y="0" width="760" height="320" rx="8" fill="url(#vb)" stroke="#004D40" stroke-width="1.5"/>
  <rect x="4" y="4" width="752" height="312" rx="6" fill="none" stroke="#006064" stroke-width="0.5"/>
  <rect x="10" y="10" width="740" height="300" rx="3" fill="url(#vp)" opacity="0.6"/>

  <!-- TOP BAND -->
