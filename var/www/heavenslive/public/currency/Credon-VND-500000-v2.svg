  <text x="380" y="175" text-anchor="middle" font-size="13" fill="#004D40" font-family="serif">ĐỒNG CREDON</text>
  
  <line x1="260" y1="190" x2="500" y2="190" stroke="#006064" stroke-width="0.3"/>
  
  <text x="380" y="210" text-anchor="middle" font-size="8" fill="#006064" font-family="serif" letter-spacing="4" opacity="0.6">★★★ DIVINELY UNDERWRITTEN ★★★</text>
  <text x="380" y="228" text-anchor="middle" font-size="7" fill="#004D40" opacity="0.4">HEAVENSLIVE • 2026 • SERIES A</text>

  <!-- RIGHT: Coat of arms / emblem -->
  <circle cx="660" cy="170" r="55" fill="none" stroke="#006064" stroke-width="0.8" opacity="0.15"/>
  <circle cx="660" cy="170" r="48" fill="none" stroke="#004D40" stroke-width="0.4" opacity="0.1"/>
