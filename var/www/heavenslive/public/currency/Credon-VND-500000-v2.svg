<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <defs>
    <pattern id="vp" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 8 Q4 0 8 8 Q12 16 16 8" fill="none" stroke="#006064" stroke-width="0.15" opacity="0.3"/>
      <path d="M8 0 Q16 4 8 8 Q0 12 8 16" fill="none" stroke="#00838F" stroke-width="0.1" opacity="0.2"/>
    </pattern>
    <linearGradient id="vb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4f1f4"/>
      <stop offset="50%" stop-color="#b2ebf2"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="gold"/>
      <stop offset="25%" stop-color="#C8A951"/>
      <stop offset="50%" stop-color="gold"/>
      <stop offset="75%" stop-color="#C8A951"/>
      <stop offset="100%" stop-color="gold"/>
