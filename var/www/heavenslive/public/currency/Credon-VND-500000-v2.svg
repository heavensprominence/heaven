  <text x="380" y="165" text-anchor="middle" font-size="6" fill="#C8A951" opacity="0.3" transform="rotate(90,380,165)">CREDON</text>

  <!-- Corner values -->
  <rect x="25" y="70" width="45" height="25" rx="2" fill="#006064" opacity="0.85"/>
  <text x="47" y="88" text-anchor="middle" font-size="12" fill="white" font-family="serif" font-weight="900">500K</text>
  
  <rect x="690" y="70" width="45" height="25" rx="2" fill="#006064" opacity="0.85"/>
  <text x="712" y="88" text-anchor="middle" font-size="12" fill="white" font-family="serif" font-weight="900">500K</text>

  <rect x="690" y="225" width="45" height="25" rx="2" fill="#006064" opacity="0.85"/>
  <text x="712" y="243" text-anchor="middle" font-size="12" fill="white" font-family="serif" font-weight="900">500K</text>

  <!-- Microprint -->
  <rect x="40" y="282" width="680" height="6" fill="#006064" opacity="0.06"/>
  <text x="380" y="280" text-anchor="middle" font-size="3.5" fill="#004D40" opacity="0.15" font-family="monospace">CREDON-VND ★ NĂM TRĂM NGHÌN ĐỒNG ★ 2026</text>

  <!-- Bottom legal -->
  <text x="380" y="305" text-anchor="middle" font-size="6" fill="#004D40" opacity="0.25" font-family="serif">TIỀN TỆ HỢP PHÁP CHO TẤT CẢ GIAO DỊCH CREDON TRÊN LÃNH THỔ VIỆT NAM VÀ QUỐC TẾ</text>

  <!-- Watermark area (transparent circle) -->
  <circle cx="115" cy="180" r="40" fill="rgba(255,255,255,0.35)" stroke="#006064" stroke-width="0.3" stroke-dasharray="2,4"/>
  <text x="115" y="185" text-anchor="middle" font-size="8" fill="#004D40" opacity="0.12" font-family="serif">HÌNH MỜ</text>
</svg>
