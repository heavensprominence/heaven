# PowerSync Sync Rules — Sharded Replication
# Different subsets go to different devices. Server holds full history.
#
# Current sharding:
#   Stream 1: Active listings only → all devices
#   Stream 2: Wallets + transactions → all devices (auth-filtered at app level)
#   Stream 3: Categories + translations → all devices (small reference data)
#   Stream 4: User profiles (id/name/avatar only) → all devices
#
# Future upgrade: user-scoped buckets (requires PowerSync edition 3+)

config:
  edition: 2

streams:
  listings:
    auto_subscribe: true
    query: "SELECT * FROM listings WHERE status = 'active'"

  wallets:
    auto_subscribe: true
    query: "SELECT * FROM wallets"

  transactions:
    auto_subscribe: true
    query: "SELECT * FROM transactions"

  shop_categories:
    auto_subscribe: true
    query: "SELECT * FROM shop_categories"

  category_translations:
    auto_subscribe: true
    query: "SELECT * FROM category_translations"

  users:
    auto_subscribe: true
    query: "SELECT id, full_name, avatar_url, created_at FROM users"
