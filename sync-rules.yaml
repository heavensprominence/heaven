# PowerSync Sync Rules — Selective Replication
# Only relevant data syncs to each device. Reduces bandwidth + storage.

config:
  edition: 2

streams:
  # Active listings only — keep recent, skip ancient
  listings:
    auto_subscribe: true
    query: >
      SELECT * FROM listings
      WHERE status = 'active'
        AND created_at > NOW() - INTERVAL '30 days'
      ORDER BY created_at DESC

  # Categories — always sync (small dataset, needed for navigation)
  shop_categories:
    auto_subscribe: true
    query: "SELECT * FROM shop_categories"

  # Category translations — only relevant languages to save bandwidth
  category_translations:
    auto_subscribe: true
    query: >
      SELECT * FROM category_translations
      WHERE lang IN ('en', 'fr', 'fa', 'ar', 'es')
