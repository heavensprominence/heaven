# PowerSync Sync Rules — Selective Replication (edition 2 compatible)
config:
  edition: 2

streams:
  listings:
    auto_subscribe: true
    query: "SELECT * FROM listings WHERE status = 'active'"

  shop_categories:
    auto_subscribe: true
    query: "SELECT * FROM shop_categories"

  category_translations:
    auto_subscribe: true
    query: "SELECT * FROM category_translations"

  # Credon Ledger — financial data per user
  wallets:
    auto_subscribe: true
    query: "SELECT * FROM wallets"

  transactions:
    auto_subscribe: true
    query: "SELECT * FROM transactions"

  # User profiles (no passwords/emails)
  users:
    auto_subscribe: true
    query: "SELECT id, full_name, avatar_url, created_at FROM users"
