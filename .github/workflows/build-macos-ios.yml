name: Build iOS + macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Build iOS (.app, no codesign)
        working-directory: mobile
        run: flutter build ios --no-codesign --release

      - name: Upload iOS .app
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-iOS
          path: mobile/build/ios/iphoneos/Runner.app

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: desktop
        run: flutter pub get --directory ../mobile 2>/dev/null; true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS (.dmg)
        working-directory: desktop
        run: cargo tauri build --target x86_64-apple-darwin
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-macOS
          path: desktop/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
