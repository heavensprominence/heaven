name: Build iOS + macOS

on:
  workflow_dispatch:

jobs:
  ios-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate iOS platform files
        working-directory: mobile
        run: flutter create --platforms ios .

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Build iOS (.app, no codesign)
        working-directory: mobile
        run: flutter build ios --no-codesign --release

      - name: Upload iOS .app
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-iOS
          path: mobile/build/ios/iphoneos/Runner.app

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build macOS (.dmg)
        working-directory: desktop
        run: cargo tauri build --target aarch64-apple-darwin
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-macOS
          path: desktop/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
