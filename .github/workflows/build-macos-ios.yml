name: Build macOS + iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build macOS (.dmg)
        working-directory: desktop
        run: cargo tauri build

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-macOS
          path: desktop/target/release/bundle/dmg/*.dmg

  ios-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Add iOS platform
        working-directory: mobile
        run: flutter create --platforms ios .

      - name: Build iOS (.app, no codesign)
        working-directory: mobile
        run: flutter build ios --no-codesign --release

      - name: Upload iOS .app
        uses: actions/upload-artifact@v4
        with:
          name: HeavensLive-iOS
          path: mobile/build/ios/iphoneos/Runner.app
