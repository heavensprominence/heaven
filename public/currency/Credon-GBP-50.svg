<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <pattern id="gbpPat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q10 0 20 10 Q10 20 0 10" fill="none" stroke="#5D4037" stroke-width="0.15" opacity="0.2"/>
      <circle cx="10" cy="10" r="6" fill="none" stroke="#795548" stroke-width="0.1" opacity="0.15"/>
    </pattern>
    <linearGradient id="gbpBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="50%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="gbpHolo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="silver"/><stop offset="50%" stop-color="white"/><stop offset="100%" stop-color="silver"/>
    </linearGradient>
  </defs>

  <!-- FRONT: GBP £50 -->
  <rect x="0" y="0" width="760" height="300" rx="8" fill="url(#gbpBg)" stroke="#4E342E" stroke-width="1.5"/>
  <rect x="5" y="5" width="750" height="290" rx="6" fill="none" stroke="#5D4037" stroke-width="0.5"/>
  <rect x="12" y="12" width="736" height="276" rx="3" fill="url(#gbpPat)" opacity="0.5"/>

  <!-- TOP BAND -->
  <rect x="20" y="15" width="720" height="42" rx="2" fill="#4E342E" opacity="0.07"/>
  <text x="380" y="38" text-anchor="middle" font-size="18" fill="#3E2723" font-family="serif" font-weight="bold" letter-spacing="8">CREDON-GBP</text>
  <text x="380" y="50" text-anchor="middle" font-size="7" fill="#5D4037" font-family="serif" letter-spacing="4">BANK OF CREDON ENGLAND</text>

  <!-- LEFT: Portrait (Queen/King placeholder) -->
  <rect x="35" y="75" width="140" height="170" rx="2" fill="rgba(255,255,255,0.5)" stroke="#795548" stroke-width="0.8"/>
  <rect x="40" y="80" width="130" height="160" rx="1" fill="none" stroke="#5D4037" stroke-width="0.3"/>
  <text x="105" y="160" text-anchor="middle" font-size="10" fill="#5D4037" opacity="0.15" font-family="serif">PORTRAIT</text>

  <!-- CENTER -->
  <rect x="205" y="75" width="350" height="170" rx="2" fill="rgba(255,255,255,0.2)"/>
  
  <text x="380" y="115" text-anchor="middle" font-size="14" fill="#4E342E" font-family="serif" font-style="italic">I Promise to Pay the Bearer on Demand</text>
  <text x="380" y="140" text-anchor="middle" font-size="12" fill="#3E2723" font-family="serif">the Sum of</text>
  <text x="380" y="170" text-anchor="middle" font-size="16" fill="#4E342E" font-family="serif" font-weight="bold">FIFTY CREDON POUNDS</text>
  <text x="380" y="200" text-anchor="middle" font-size="46" fill="#5D4037" font-family="serif" font-weight="900">£50</text>
  
  <text x="380" y="225" text-anchor="middle" font-size="8" fill="#795548" font-family="serif" letter-spacing="3" opacity="0.5">★★★ DIVINELY UNDERWRITTEN ★★★</text>

  <!-- RIGHT: Britannia/emblem -->
  <circle cx="660" cy="160" r="50" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.15"/>
  <circle cx="660" cy="160" r="43" fill="none" stroke="#4E342E" stroke-width="0.4" opacity="0.1"/>
  <text x="660" y="165" text-anchor="middle" font-size="40" fill="#4E342E" opacity="0.06">£</text>

  <!-- Hologram strip -->
  <rect x="370" y="70" width="20" height="160" fill="url(#gbpHolo)" opacity="0.12"/>
  <text x="378" y="155" text-anchor="middle" font-size="5" fill="#795548" opacity="0.25" transform="rotate(90,380,155)">£50 CREDON</text>

  <!-- Serial -->
  <text x="590" y="22" font-size="9" fill="#3E2723" font-family="monospace" opacity="0.6">HL 500001 G</text>
  <text x="590" y="285" font-size="9" fill="#3E2723" font-family="monospace" opacity="0.6">HL 500001 G</text>

  <!-- Corner values -->
  <g>
    <rect x="20" y="60" width="50" height="28" rx="3" fill="#4E342E" opacity="0.9"/>
    <text x="45" y="80" text-anchor="middle" font-size="14" fill="white" font-family="serif" font-weight="900">£50</text>
    
    <rect x="690" y="60" width="50" height="28" rx="3" fill="#4E342E" opacity="0.9"/>
    <text x="715" y="80" text-anchor="middle" font-size="14" fill="white" font-family="serif" font-weight="900">£50</text>
    
    <rect x="690" y="212" width="50" height="28" rx="3" fill="#4E342E" opacity="0.9"/>
    <text x="715" y="232" text-anchor="middle" font-size="14" fill="white" font-family="serif" font-weight="900">£50</text>
  </g>

  <!-- Microprint -->
  <rect x="40" y="268" width="680" height="4" fill="#4E342E" opacity="0.05"/>
  <text x="380" y="265" text-anchor="middle" font-size="3.5" fill="#5D4037" opacity="0.12" font-family="monospace">CREDON-GBP ★ BANK OF CREDON ENGLAND ★ 2026</text>

  <text x="380" y="290" text-anchor="middle" font-size="6" fill="#4E342E" opacity="0.2" font-family="serif">LEGAL TENDER FOR ALL CREDON TRANSACTIONS THROUGHOUT THE UNITED KINGDOM AND TERRITORIES</text>
</svg>
