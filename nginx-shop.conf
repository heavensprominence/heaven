server {
    listen 80;
    server_name shop.heavenslive.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shop.heavenslive.com;
    
    ssl_certificate /etc/letsencrypt/live/heavenslive.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heavenslive.com-0001/privkey.pem;
    
    client_max_body_size 20M;
    
    root /var/www/heavenslive/frontend-shop/build;
    index index.html;
    
    # Serve uploaded images - exact path match
    location ^~ /uploads/ {
        alias /var/www/heavenslive/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Serve React static assets from /shop/static/ path (SPA uses /shop prefix)
    location ^~ /shop/static/ {
        alias /var/www/heavenslive/frontend-shop/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API proxy
    location /api/ {
        client_max_body_size 20M;
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # React app - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
}
