<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Verify</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:12px 20px;display:flex;justify-content:space-between}
.nav-brand{font-size:1.2rem;font-weight:700;color:var(--gold)}.nav-links a{color:var(--text);text-decoration:none;font-size:.85rem;margin-left:12px}
.container{max-width:900px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,255,255,.05);margin-bottom:16px}
h1{color:var(--gold)}.muted{color:var(--muted);font-size:.85rem}.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:var(--gold);color:var(--darker)}
input,textarea{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);margin-bottom:8px}
</style></head><body>
<nav><div class="nav-brand" data-i18n="brand.title">HeavensMarket</div><div class="nav-links"><a href="/shop/">Browse</a><a href="/shop/cart">🛒</a><a href="/shop/create">+ Post</a><a href="/credon/wallet">Wallet</a><a href="/">Home</a></div></nav>
<div class="container"><h1 data-i18n="brand.enterCode">Enter Code</h1><div class="card" style="max-width:400px;margin:0 auto;text-align:center"><p class="muted" data-i18n="page.sub_check_email">Check email</p><input id="vc" maxlength="6" placeholder="000000" style="font-size:1.5rem;text-align:center;letter-spacing:8px"><button class="btn" onclick="verify()">Verify</button></div><script>function verify(){var s=new URLSearchParams(location.search);fetch("/api/auth/verify-2fa",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sessionId:s.get("session"),code:document.getElementById("vc").value})}).then(r=>r.json()).then(d=>{if(d.token){localStorage.setItem("token",d.token);location.href="/shop/"}else{document.getElementById("vc").nextElementSibling.textContent=d.error}})}</script></div><script src="/auth.js"></script><script src="/i18n.js"></script>
</body></html>
