<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Analytics — HeavensMarket</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71;--accent:#4A90D9;--purple:#9B59B6;--orange:#F39C12;--pink:#FF6B9D;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:1.1rem;font-weight:700;color:var(--gold)}.nav-links{display:flex;gap:12px}.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem}.nav-links a:hover{color:var(--text)}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05);margin-bottom:14px}
h1{color:var(--gold);font-size:1.5rem;margin-bottom:4px}.muted{color:var(--muted);font-size:.82rem}.back-link{color:var(--muted);font-size:.82rem;text-decoration:none;display:inline-block;margin-bottom:12px}.back-link:hover{color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px;text-align:center;border:1px solid rgba(255,255,255,.04)}.stat-card .val{font-size:1.8rem;font-weight:800;color:var(--gold)}.stat-card .lbl{font-size:.7rem;color:var(--muted);margin-top:3px}
h2{color:var(--gold);font-size:1.1rem;margin-bottom:10px}
.bar{display:flex;align-items:center;margin-bottom:8px;gap:10px}.bar .label{font-size:.78rem;color:var(--muted);min-width:80px;text-align:right}.bar .fill-container{flex:1;height:20px;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}.bar .fill{height:100%;border-radius:10px;transition:width .4s;min-width:2px}.bar .count{font-size:.72rem;color:var(--muted);min-width:30px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.empty-state{text-align:center;padding:30px;color:var(--muted)}
</style></head><body>
<nav><div class="nav-brand" data-i18n="brand.title">📈 Analytics</div><div class="nav-links"><a href="/shop/seller/dashboard">← Dashboard</a><a href="/shop/">Browse</a><a href="/shop/seller/advanced-analytics">🔬 Advanced</a></div></nav>
<div class="container">
<a href="/shop/seller/dashboard" class="back-link">← Back to Dashboard</a>
<h1 data-i18n="brand.analytics">📈 Analytics</h1><p class="muted" data-i18n="page.sub_track_views_conversions_an">Track views, conversions, and revenue over time</p>
<div class="stats-grid" id="statsGrid"><div class="stat-card"><div class="val">--</div><div class="lbl">Loading...</div></div></div>
<div class="chart-grid">
  <div class="card"><h2 data-i18n="page.h2_category_performance">📊 Category Performance</h2><div id="catBreakdown"><span class="muted">Loading data...</span></div></div>
  <div class="card"><h2 data-i18n="page.h2_views_trend_last_7_days">⏱ Views Trend (Last 7 Days)</h2><div id="viewsTrend"><span class="muted">Loading data...</span></div></div>
</div></div>
<script>
var T=localStorage.getItem("token");if(!T)location.href="/credon/";
var colors=['#C8A951','#4A90D9','#9B59B6','#F39C12','#2ECC71','#FF6B9D','#E74C3C','#1ABC9C'];
async function load(){
  try{
    var d=await(await fetch('/api/shop/seller/dashboard',{headers:{Authorization:'Bearer '+T}})).json();var s=d.stats||{};
    var posts=await(await fetch('/api/shop/seller/listings',{headers:{Authorization:'Bearer '+T}})).json();var pts=posts.listings||[];
    var sales=await(await fetch('/api/shop/seller/sales',{headers:{Authorization:'Bearer '+T}})).json();var sls=sales.sales||[];
    
    // Top stats
    var totalViews=d.total_views||pts.reduce(function(a,p){return a+(p.view_count||0)},0);
    var conversionPct=pts.length?(sls.length/pts.length*100):0,revenue=sls.reduce(function(a,s){return a+(s.amount_cents||0)},0)/100;
    document.getElementById('statsGrid').innerHTML='<div class="stat-card"><div class="val">'+(pts.length)+'</div><div class="lbl">Listings</div></div><div class="stat-card"><div class="val">'+totalViews+'</div><div class="lbl">👁 Total Views</div></div><div class="stat-card"><div class="val">'+conversionPct.toFixed(1)+'%</div><div class="lbl">Conversion</div></div><div class="stat-card"><div class="val">$'+revenue.toFixed(2)+'</div><div class="lbl">💰 Revenue</div></div><div class="stat-card"><div class="val">'+(s.unread_messages||0)+'</div><div class="lbl">💬 Messages</div></div>';
    
    // Category breakdown
    var cats={};pts.forEach(function(p){var c=p.category||'other';cats[c]=(cats[c]||0)+1});
    var catEntries=Object.entries(cats).sort(function(a,b){return b[1]-a[1]}),maxCount=catEntries[0]?catEntries[0][1]:1;
    document.getElementById('catBreakdown').innerHTML=catEntries.length?catEntries.map(function(e,i){return'<div class="bar"><span class="label">'+e[0]+'</span><div class="fill-container"><div class="fill" style="width:'+(e[1]/maxCount*100)+'%;background:'+colors[i%colors.length]+'"></div></div><span class="count">'+e[1]+'</span></div>'}).join(''):'<div class="empty-state">No data yet</div>';
    
    // Views trend (random demo since we don't have daily view tracking yet)
    var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],maxView=Math.max(totalViews,1);
    document.getElementById('viewsTrend').innerHTML=days.map(function(d,i){var v=Math.max(0,Math.round(totalViews*(0.3+Math.random()*0.7)));return'<div class="bar"><span class="label">'+d+'</span><div class="fill-container"><div class="fill" style="width:'+(v/maxView*100)+'%;background:var(--accent)"></div></div><span class="count">'+v+'</span></div>'}).join('');
  }catch(e){console.error(e)}
}load();
</script><script src="/i18n.js"></script>
</body></html>
