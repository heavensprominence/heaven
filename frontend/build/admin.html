<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin — HeavensLive</title>
<style>:root{--gold:#C8A951;--darker:#0F0F1A;--card:#16213E;--text:#E8E6E3;--muted:#A0A0B0;--success:#2ECC71;--danger:#E74C3C;--accent:#4A90D9;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:var(--darker);color:var(--text)}
nav{background:rgba(15,15,26,.95);border-bottom:1px solid rgba(200,169,81,.2);padding:10px 20px;display:flex;justify-content:space-between}
.nav-brand{font-size:1.1rem;font-weight:700;color:var(--gold)}.nav-links a{color:var(--muted);text-decoration:none;font-size:.82rem;margin-left:12px}
.container{max-width:960px;margin:0 auto;padding:24px 20px}.card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05);margin-bottom:14px}
h1{color:var(--gold);font-size:1.3rem;margin-bottom:4px}h2{color:var(--gold);font-size:1rem;margin:0 0 12px}.muted{color:var(--muted);font-size:.82rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.stat{text-align:center;padding:14px;background:rgba(255,255,255,.02);border-radius:8px}.stat .num{font-size:1.5rem;font-weight:800;color:var(--gold)}.stat .lbl{font-size:.68rem;color:var(--muted)}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:.8rem;background:var(--gold);color:var(--darker)}.btn.sm{padding:4px 10px;font-size:.7rem}
.btn.on{background:rgba(46,204,113,.15);color:var(--success);border:1px solid rgba(46,204,113,.3)}.btn.off{background:rgba(231,76,60,.1);color:var(--danger)}.btn.info{background:rgba(74,144,217,.1);color:var(--accent)}
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;gap:8px}
.row:hover{background:rgba(255,255,255,.01)}
input,select,textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text);font-size:.82rem;margin-bottom:6px}
.inline{width:auto;display:inline-block;margin-right:6px;margin-bottom:0}
.tabs{display:flex;gap:0;margin-bottom:16px;flex-wrap:wrap}.tab{padding:8px 16px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;color:var(--muted);font-size:.82rem;font-weight:600}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel{display:none}.panel.active{display:block}
.cat-tree .level1{padding-left:0}.cat-tree .level2{padding-left:20px}.cat-tree .level3{padding-left:40px}
.lang-flags{display:flex;gap:4px;flex-wrap:wrap}.lang-flag{padding:2px 8px;font-size:.65rem;background:rgba(255,255,255,.03);border-radius:4px;cursor:pointer;border:1px solid transparent}.lang-flag:hover{border-color:var(--gold)}.lang-flag.sel{background:rgba(200,169,81,.15);color:var(--gold)} 
</style></head><body>
<nav><div class="nav-brand">⚙ Admin Panel</div><div class="nav-links"><a href="/credon/wallet">← Wallet</a><a href="/shop/">Shop</a><a href="/">Home</a></div></nav>
<div class="container">
<h1>⚙ Admin Panel</h1>
<div class="tabs">
  <button class="tab active" onclick="switchTab('overview',this)">📊 Overview</button>
  <button class="tab" onclick="switchTab('categories',this)">📂 Categories</button>
  <button class="tab" onclick="switchTab('suggestions',this)">💡 Suggestions</button>
  <button class="tab" onclick="switchTab('users',this)">👥 Users</button>
  <button class="tab" onclick="switchTab('settings',this)">⚙️ Settings</button>
  <button class="tab" onclick="switchTab('analytics',this)">📈 Analytics</button>
  <button class="tab" onclick="switchTab('affiliate',this)">💸 Affiliate</button>
</div>
<div id="panel-overview" class="panel active"></div>
<div id="panel-categories" class="panel"></div>
<div id="panel-suggestions" class="panel"></div>
<div id="panel-users" class="panel"></div>
<div id="panel-settings" class="panel"></div>
<div id="panel-analytics" class="panel"></div>
<div id="panel-affiliate" class="panel"></div>
</div>
<script>
setTimeout(function(){
var T=localStorage.getItem('token');if(!T)location.href='/credon/';
var A=function(u,o){var h={};if(o&&o.headers)h=o.headers;h.Authorization='Bearer '+T;var b=o?o.body:null;if(b&&typeof b==='object'){h['Content-Type']='application/json';b=JSON.stringify(b)}return fetch(u,{method:o?o.method||'GET':'GET',headers:h,body:b}).then(function(r){return r.json()})};

var DATA={}; // shared data cache

window.switchTab=function(name,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  if(el)el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='overview')loadOverview();
  if(name==='categories')loadCategories();
  if(name==='suggestions')loadSuggestions();
  if(name==='users')loadUsers();
  if(name==='settings')loadSettings();
  if(name==='analytics')loadAnalytics();
  if(name==='affiliate')loadAffiliate();
}

// ===== OVERVIEW =====
window.loadOverview=async function(){
  var s=await A('/api/admin/stats'),ust=s.users||{},list=s.listings||'--';
  var t=await A('/api/admin/treasury'),tr=t.summary||{};
  var cr=await A('/api/admin/credon/pending'),pend=(cr.pending||[]).length;
  var dp=await A('/api/admin/disputes'),disp=(dp.disputes||[]).length;
  var cs=await A('/api/shop/categories/suggestions/pending'),spend=((cs.suggestions||[]).length);
  
  document.getElementById('panel-overview').innerHTML=
    '<div class="stats">'+
      '<div class="stat"><div class="num">'+(ust.total_users||'--')+'</div><div class="lbl">Total Users</div></div>'+
      '<div class="stat"><div class="num">'+(list||'--')+'</div><div class="lbl">Listings</div></div>'+
      '<div class="stat"><div class="num">$'+((tr.treasury_balance||0)/100).toFixed(2)+'</div><div class="lbl">Treasury</div></div>'+
      '<div class="stat"><div class="num">'+disp+'</div><div class="lbl">Disputes</div></div>'+
      '<div class="stat"><div class="num">'+pend+'</div><div class="lbl">Credon Requests</div></div>'+
      '<div class="stat"><div class="num">'+spend+'</div><div class="lbl">Cat Suggestions</div></div>'+
    '</div>'+
    '<div class="card"><h2>System Settings</h2><div id="quickSettings"><span class="muted">Loading...</span></div></div>'+'<div class="card"><h2>Platform Fee</h2><div style="display:flex;align-items:center;gap:8px"><span>The marketplace commission HeavensLive charges on every sale:</span><input id="platformFeePct" type="number" step="0.1" value="2" style="width:80px;margin:0"><span>%</span><button class="btn sm" onclick="savePlatformFee()">Save</button></div></div>'+
    '<div class="card"><h2>Pending Credon Registrations</h2><div id="quickCredon"><span class="muted">Loading...</span></div></div>'+
    '<div class="card"><h2>Pending Category Suggestions</h2><div id="quickSuggestions"><span class="muted">Loading...</span></div></div>';
  
  // Quick settings
  var set=await A('/api/admin/settings'),sets=set.settings||{};
  var sh='';Object.keys(sets).forEach(function(k){sh+='<div class="row"><span>'+k.replace(/_/g,' ')+'</span><button class="btn sm '+(sets[k]?'on':'off')+'" onclick="toggleSetQuick(\''+k+'\','+(!sets[k])+')">'+(sets[k]?'ON':'OFF')+'</button></div>'});
  document.getElementById('quickSettings').innerHTML=sh;
  
  // Quick credon
  var p=cr.pending||[];
  // Set platform fee from settings
  var pf=sets.platform_fee_percent||2;var pfEl=document.getElementById('platformFeePct');if(pfEl)pfEl.value=pf;
  document.getElementById('quickCredon').innerHTML=p.length?p.map(function(u){return'<div class="row"><div><strong>'+u.email+'</strong> '+u.full_name+'<br><span class="muted">'+((u.join_reason||'').substring(0,60))+'</span></div><div><button class="btn sm on" onclick="act(\''+u.id+'\',\'approve\')">Approve</button><button class="btn sm off" onclick="act(\''+u.id+'\',\'reject\')">Reject</button></div></div>'}).join(''):'<span class="muted">No pending requests</span>';
  
  // Quick suggestions
  var sg=cs.suggestions||[];
  document.getElementById('quickSuggestions').innerHTML=sg.length?sg.map(function(s){return'<div class="row"><div><strong>'+s.suggested_name+'</strong> '+(s.parent_category?'under '+s.parent_category:'top-level')+'<br><span class="muted">by '+s.user_email+'</span></div></div>'}).join(''):'<span class="muted">No pending suggestions</span>';
}

// ===== CATEGORIES =====
window.loadCategories=async function(){
  var cats=await A('/api/shop/categories');
  var all=(cats.categories||[]).sort(function(a,b){return (a.name||'').localeCompare(b.name||'')});
  var h='<div class="card"><h2>Category Tree ('+all.length+' categories)</h2>'+
    '<div style="margin-bottom:12px"><input id="newCatName" class="inline" placeholder="Category name" style="width:180px"><select id="newCatParent" class="inline" style="width:140px;margin-bottom:0"><option value="">No parent (top-level)</option></select>'+
    '<div class="lang-flags" style="display:inline-flex;margin:0 4px">'+['📱','👕','🏠','💎','🚗','📚','🎮','🎵','🐾','🌿','🍔','💄','⚽','🎨','✈️','💻','📷','⌚','🎁','🔧','💰','🎓','🏥','🌍','📦'].map(function(e){return '<span class="lang-flag" onclick="document.getElementById(\'newCatIcon\').value=\''+e+'\'" style="cursor:pointer">'+e+'</span>'}).join('')+'</div>'+
    '<button class="btn sm" onclick="addCat()">+ Add</button></div>'+
    '<div style="margin-bottom:8px"><span class="muted">View translations:</span> <div class="lang-flags" id="langFlags"></div></div>'+
    '<div class="cat-tree" id="catTree"></div></div>';
  
  // Load subcategories for each parent
  var tree='';
  // Load all categories including subcategories from API
  for(var i=0;i<all.length;i++){if(!all[i])continue;
    var c=all[i],lvl=c.parent_category?'level2':'level1';
    tree+='<div class="row '+lvl+'"><div><strong>'+c.name+'</strong> <span class="muted">'+c.slug+'</span> '+(c.parent_category?'<span style="font-size:.7rem;color:var(--accent)">← '+c.parent_category+'</span>':'')+((c.subcategory_count||0)>0?' <button class="btn sm info" onclick="expandCat(\''+c.slug+'\',this)" style="font-size:.6rem;padding:2px 6px">▶ Expand</button>':'')+'</div><span class="muted">'+c.count+' listings</span></div>';
    if((c.subcategory_count||0)>0) tree+='<div id="kids-'+c.slug+'" style="display:none"></div>';
  }
  
  document.getElementById('panel-categories').innerHTML=h;
  // Populate parent dropdown AFTER setting innerHTML
  setTimeout(function(){
    var sel=document.getElementById('newCatParent');
    if(sel){sel.innerHTML='<option value="">No parent (top-level)</option>';all.forEach(function(c){sel.innerHTML+='<option value="'+c.slug+'">'+c.name+'</option>'});}
    // Also load subcategories for each parent
    document.getElementById('catTree').innerHTML=tree;
    document.getElementById('langFlags').innerHTML=flags;
  },100);
  document.getElementById('catTree').innerHTML=tree||'<span class="muted">No categories</span>';
  
  // Lang flags
  var langs=['en','fa','ja','zh','fr','de','es','ar','ko','ru','pt','hi','sv','tl','tr','ur','vi'];
  var flags='';
  langs.forEach(function(l){
    flags+='<span class="lang-flag" onclick="viewLang(\''+l+'\',this)" data-lang="'+l+'">'+l.toUpperCase()+'</span>';
  });
  document.getElementById('langFlags').innerHTML=flags;
}

window.expandCat=async function(slug,btn){
  var kids=document.getElementById('kids-'+slug);
  if(!kids)return;
  if(kids.style.display==='none'){
    kids.style.display='block';btn.textContent='▼';
    var cats=await A('/api/shop/categories/subcategories/'+slug);
    var subs=(cats.subcategories||cats.categories||[]);
    kids.innerHTML=subs.map(function(c){return'<div class="row level2"><div><strong>'+c.name+'</strong> <span class="muted">'+c.slug+'</span></div><span class="muted">'+c.count+' listings</span></div>'}).join('')||'<span class="muted">No subcategories</span>';
  }else{kids.style.display='none';btn.textContent='▶ Expand'}
};
window.viewLang=async function(lang,el){
  document.querySelectorAll('.lang-flag').forEach(function(f){f.classList.remove('sel')});
  if(el)el.classList.add('sel');
  var cats=await A('/api/shop/categories?lang='+lang);
  var all=(cats.categories||[]).sort(function(a,b){return (a.name||'').localeCompare(b.name||'')});
  var tree='';
  all.forEach(function(c){
    var lvl=c.parent_category?'level2':'level1';
    tree+='<div class="row '+lvl+'"><div><strong>'+c.name+'</strong> <span class="muted">'+c.slug+'</span> '+(c.parent_category?'<span style="font-size:.7rem;color:var(--accent)">← '+c.parent_category+'</span>':'')+'</div><span class="muted">'+c.count+' listings</span></div>';
  });
  document.getElementById('catTree').innerHTML=tree||'<span class="muted">No categories</span>';
}

// ===== SUGGESTIONS =====
window.loadSuggestions=async function(){
  var sg=await A('/api/shop/categories/suggestions/pending');
  var suggestions=(sg.suggestions||[]);
  document.getElementById('panel-suggestions').innerHTML=
    '<div class="card"><h2>Category Suggestions ('+suggestions.length+' pending)</h2>'+
    (suggestions.length?suggestions.map(function(s){
      return'<div class="row"><div><strong>'+s.suggested_name+'</strong> '+(s.parent_category?'<span class="muted">under '+s.parent_category+'</span>':'<span class="muted">top-level</span>')+'<br><span class="muted">by '+s.user_email+' on '+new Date(s.created_at).toLocaleDateString()+'</span>'+(s.description?'<br><span style="font-size:.8rem">'+s.description+'</span>':'')+'</div><div><button class="btn sm on" onclick="approveSuggestion(\''+s.id+'\',\''+s.suggested_name+'\',\''+(s.parent_category||'')+'\')">Approve</button><button class="btn sm off" onclick="rejectSuggestion(\''+s.id+'\')">Reject</button></div></div>';
    }).join(''):'<span class="muted">No pending suggestions</span>')+'</div>';
}

// ===== USERS =====
window.loadUsers=async function(){
  var u=await A('/api/admin/users'),users=u.users||[];
  document.getElementById('panel-users').innerHTML=
    '<div class="card"><h2>User Management ('+users.length+')</h2><input id="userSearch" class="inline" placeholder="Search by email..." oninput="filterUsers()" style="width:280px"><div id="userList">'+
    users.map(function(u){return'<div class="row" data-email="'+u.email+'"><div><strong>'+u.email+'</strong> '+u.full_name+(u.is_suspended?' <span style="color:#E74C3C">SUSPENDED</span>':'')+(u.is_super_admin?' <span style="color:#9B59B6">ADMIN</span>':'')+'</div><div>'+(u.is_suspended?'<button class="btn sm on" onclick="unsuspend(\''+u.id+'\')">Unsuspend</button>':'<button class="btn sm off" onclick="suspend(\''+u.id+'\')">Suspend</button>')+'</div></div>'}).join('')+
    '</div></div>';
}

// ===== SETTINGS =====
window.loadSettings=async function(){
  var set=await A('/api/admin/settings'),sets=set.settings||{};
  document.getElementById('panel-settings').innerHTML=
    '<div class="card"><h2>System Settings</h2>'+
    Object.keys(sets).map(function(k){return'<div class="row"><span>'+k.replace(/_/g,' ')+'</span><button class="btn sm '+(sets[k]?'on':'off')+'" onclick="toggleSetMain(\''+k+'\','+(!sets[k])+')">'+(sets[k]?'ON':'OFF')+'</button></div>'}).join('')+
    '</div>';
}

// ===== AFFILIATE =====
window.loadAffiliate=async function(){
  var af=await A('/api/admin/affiliate/settings'),aff=af.settings||{};
  document.getElementById('panel-affiliate').innerHTML=
    ''+'<div class="card"><h2>Affiliate Commissions</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
      '<div>Signup Bonus (Credon-USD)<br><input id="affSn" type="number" step="0.01" value="'+(aff.signup_bonus||0.5)+'"><span class="muted" style="font-size:.65rem">Paid in Credon when referral signs up</span></div>'+
      '<div>First Purchase (%)<br><input id="affFp" type="number" step="0.1" value="'+(aff.first_purchase_rate||5)+'"><span class="muted" style="font-size:.65rem">Affiliate earns this % of referral\'s 1st purchase</span></div>'+
      '<div>Ongoing Purchase (%)<br><input id="affOp" type="number" step="0.1" value="'+(aff.ongoing_purchase_rate||2)+'"><span class="muted" style="font-size:.65rem">Affiliate earns this % of referral\'s repeat purchases</span></div>'+
      '<div>Seller Sale (%)<br><input id="affSs" type="number" step="0.1" value="'+(aff.seller_sale_rate||1)+'"><span class="muted" style="font-size:.65rem">Affiliate earns when their referred user sells something</span></div>'+
      
      '<div>Min Payout ($)<br><input id="affMp" type="number" step="0.01" value="'+((aff.minimum_payout_cents||2500)/100).toFixed(2)+'"><span class="muted" style="font-size:.65rem">Minimum balance before affiliate can withdraw</span></div>'+
    '</div><button class="btn" onclick="saveAff()" style="margin-top:10px">Save</button></div>';
}

// ===== ACTIONS =====
window.filterUsers=function(){var q=document.getElementById('userSearch').value.toLowerCase();document.querySelectorAll('#userList .row').forEach(function(r){r.style.display=(r.getAttribute('data-email')||'').toLowerCase().includes(q)?'flex':'none'})};
window.act=async function(id,action){await A('/api/admin/credon/'+action,{method:'POST',body:{userId:id}});loadOverview()};
window.toggleSetQuick=async function(k,v){await A('/api/admin/settings',{method:'POST',body:{key:k,value:v}});loadOverview()};
window.toggleSetMain=async function(k,v){await A('/api/admin/settings',{method:'POST',body:{key:k,value:v}});loadSettings()};
window.suspend=async function(id){var r=prompt('Reason for suspension:');if(!r)return;var d=prompt('Duration in days (blank = permanent):');await A('/api/admin/users/'+id+'/suspend',{method:'POST',body:{reason:r,duration_days:d?parseInt(d):null}});loadUsers()};
window.unsuspend=async function(id){await A('/api/admin/users/'+id+'/unsuspend',{method:'POST'});loadUsers()};
window.savePlatformFee=async function(){var v=parseFloat(document.getElementById('platformFeePct').value)||2;await A('/api/admin/settings',{method:'POST',body:{key:'platform_fee_percent',value:v}});var set=await A('/api/admin/settings');var s=set.settings||{};await A('/api/admin/affiliate/settings',{method:'POST',body:{platform_fee_percent:v}});alert('Platform fee set to '+v+'%')};
window.saveAff=async function(){await A('/api/admin/affiliate/settings',{method:'POST',body:{signup_bonus:parseFloat(document.getElementById('affSn').value),first_purchase_rate:parseFloat(document.getElementById('affFp').value),ongoing_purchase_rate:parseFloat(document.getElementById('affOp').value),seller_sale_rate:parseFloat(document.getElementById('affSs').value),minimum_payout_cents:Math.round(parseFloat(document.getElementById('affMp').value)*100)}});alert('Saved!')};
window.addCat=async function(){var n=document.getElementById('newCatName').value;if(!n)return alert('Enter name');var p=document.getElementById('newCatParent').value;var i=document.getElementById('newCatIcon').value;var r=await A('/api/shop/categories/admin/create',{method:'POST',body:{name:n,parent_category:p||null,icon:i||'📁'}});if(r.success){alert('Added and auto-translated to 16 languages!');loadCategories()}else alert(r.error)};
window.approveSuggestion=async function(id,name,parent){window._sname=name;window._sid=id;window._sparent=parent;var icon=prompt('Icon (emoji):','📁');if(!icon)return;await A('/api/shop/categories/suggestions/'+id+'/approve',{method:'POST',body:{displayName:name,icon:icon}});alert('Approved and auto-translated!');loadSuggestions();loadCategories()};
window.rejectSuggestion=async function(id){var r=prompt('Reason for rejection (optional):');await A('/api/shop/categories/suggestions/'+id+'/reject',{method:'POST',body:{reason:r||''}});loadSuggestions()};


// ===== ANALYTICS =====
window.loadAnalytics=async function(){
  try{
    var d=await A('/api/shop/analytics/admin/overview');
    var s=d.stats||{},cats=d.categories||[],sellers=d.topSellers||[],daily=d.daily||[];
    var h='<div class="stats">'+
      '<div class="stat"><div class="num">$'+((s.revenue_cents||0)/100).toFixed(2)+'</div><div class="lbl">Revenue (30d)</div></div>'+
      '<div class="stat"><div class="num">$'+((s.fee_revenue||0)/100).toFixed(2)+'</div><div class="lbl">Platform Fees</div></div>'+
      '<div class="stat"><div class="num">'+(s.new_users||'--')+'</div><div class="lbl">New Users (30d)</div></div>'+
      '<div class="stat"><div class="num">'+(s.new_listings||'--')+'</div><div class="lbl">New Listings (30d)</div></div>'+
      '<div class="stat"><div class="num">'+(s.total_purchases||'--')+'</div><div class="lbl">Total Purchases</div></div>'+
      '<div class="stat"><div class="num">$'+((s.avg_order||0)/100).toFixed(2)+'</div><div class="lbl">Avg Order</div></div>'+
    '</div>';
    
    // Top Categories
    h+='<div class="card"><h2>Top Categories by Revenue</h2>';
    if(cats&&cats.length){
      var maxRev=cats[0].revenue||1;
      cats.forEach(function(c){
        var pct=Math.round((c.revenue||0)/maxRev*100);
        h+='<div class="row"><span>'+c.category+'</span><div style="flex:1;margin:0 10px"><div style="height:20px;background:rgba(200,169,81,'+(0.1+pct/200)+');border-radius:10px;width:'+pct+'%"></div></div><span class="muted">$'+((c.revenue||0)/100).toFixed(2)+'</span></div>';
      });
    }else h+='<span class="muted">No category data yet</span>';
    h+='</div>';
    
    // Top Sellers
    h+='<div class="card"><h2>Top Sellers</h2>';
    if(sellers&&sellers.length){
      sellers.forEach(function(s,i){
        h+='<div class="row"><div><strong>#'+(i+1)+'</strong> '+s.email+'</div><span>$'+((s.revenue||0)/100).toFixed(2)+'</span></div>';
      });
    }else h+='<span class="muted">No seller data yet</span>';
    h+='</div>';
    
    // Daily Revenue
    if(daily&&daily.length){
      h+='<div class="card"><h2>Daily Revenue (Last 7 Days)</h2>';
      var maxD=Math.max.apply(null,daily.map(function(x){return x.revenue||0}))||1;
      daily.slice(-7).forEach(function(d){
        var pct=Math.round((d.revenue||0)/maxD*100);
        h+='<div class="row"><span>'+d.date+'</span><div style="flex:1;margin:0 10px"><div style="height:20px;background:rgba(74,144,217,'+(0.15+pct/150)+');border-radius:10px;width:'+pct+'%"></div></div><span class="muted">$'+((d.revenue||0)/100).toFixed(2)+'</span></div>';
      });
      h+='</div>';
    }
    
    document.getElementById('panel-analytics').innerHTML=h;
  }catch(e){document.getElementById('panel-analytics').innerHTML='<span class="muted">Analytics unavailable</span>'}
}

loadOverview();
},200);
</script></body></html>
